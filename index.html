<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>猫猫签</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #EEF0EA;
  --card:   #F5F7F2;
  --border: #C8CCC4;
  --text:   #2E3A2C;
  --text2:  #6A7A68;
  --text3:  #9AABA0;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; min-height: 100%;
  background: var(--bg);
  font-family: 'Noto Serif SC', 'SimSun', serif;
  -webkit-font-smoothing: antialiased;
  color: var(--text);
}

#home {
  width: 100%; min-height: 100svh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 3rem 1.5rem;
  gap: 2.6rem;
}
.home-title {
  font-size: 38px; font-weight: 600;
  letter-spacing: 12px; color: var(--text);
  text-align: center;
}
.jar-wrap {
  display: flex; flex-direction: column;
  align-items: center; gap: 1.6rem;
  cursor: pointer;
}
@keyframes bob {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-9px); }
}
@keyframes shake {
  0%   { transform: rotate(0deg); }
  10%  { transform: rotate(-16deg) translateY(-5px); }
  25%  { transform: rotate(16deg) translateY(-7px); }
  40%  { transform: rotate(-12deg) translateY(-4px); }
  55%  { transform: rotate(12deg) translateY(-5px); }
  70%  { transform: rotate(-7deg) translateY(-2px); }
  85%  { transform: rotate(4deg); }
  100% { transform: rotate(0deg); }
}
.bobbing { animation: bob 3.5s ease-in-out infinite; transform-origin: center bottom; }
.shaking { animation: shake .78s ease !important; transform-origin: center bottom; }

.tap-hint {
  font-size: 14px; font-weight: 400;
  color: var(--text3); letter-spacing: 5px;
}
.fly-sticks { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:hidden; }
.fly-stick {
  position:absolute; width:3px; border-radius:2px;
  animation: flyUp .9s ease-out forwards;
}
@keyframes flyUp {
  0%   { opacity:1; }
  100% { opacity:0; transform:translateY(-100px) rotate(var(--r)); }
}

#result {
  display:none; width:100%; min-height:100svh;
  padding:2rem 1.1rem 3rem;
  flex-direction:column; align-items:center;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
.result-card {
  width:100%; max-width:390px;
  background:var(--card);
  border:0.5px solid var(--border);
  border-radius:3px; overflow:hidden;
  animation:fadeUp .38s ease both;
}
.card-top {
  display:flex; justify-content:space-between; align-items:center;
  padding:1rem 1.4rem .85rem;
  border-bottom:0.5px solid var(--border);
}
.res-num { font-size:12px; font-weight:400; color:var(--text3); letter-spacing:1px; }
.res-badge {
  font-size:12px; font-weight:600;
  padding:3px 16px; border-radius:2px; letter-spacing:3px;
}
.res-poem {
  padding:1.5rem 1.4rem 1.3rem;
  font-size:20px; font-weight:500;
  color:var(--text); line-height:2.5;
  letter-spacing:8px; text-align:center;
  white-space:pre-line;
  border-bottom:0.5px solid var(--border);
}
.poem-char { display:inline-block; animation:charIn .32s ease both; }
@keyframes charIn {
  from { opacity:0; transform:translateY(5px); }
  to   { opacity:1; transform:translateY(0); }
}
.card-section {
  padding:1rem 1.4rem;
  border-bottom:0.5px solid var(--border);
}
.card-section:last-of-type { border-bottom:none; }
.sec-label {
  font-size:11px; font-weight:600;
  color:var(--text3); letter-spacing:4px; margin-bottom:.65rem;
}
.meaning-text {
  font-size:13.5px; font-weight:400;
  color:var(--text2); line-height:2;
}
.dd-table { width:100%; border-collapse:collapse; }
.dd-table tr { border-bottom:0.5px solid var(--border); }
.dd-table tr:last-child { border-bottom:none; }
.dd-table td { padding:9px 0; font-size:13.5px; font-weight:400; vertical-align:top; line-height:1.6; }
.dd-key { color:var(--text2); width:78px; font-size:12.5px; }
.dd-sep { color:var(--border); width:14px; }
.dd-val { color:var(--text); }
.zhenyan {
  font-size:13.5px; font-weight:400;
  color:var(--text2); line-height:2;
  padding-left:1rem;
  border-left:2px solid var(--border);
}
.again-wrap { padding:1.1rem 1.4rem 1.3rem; border-top:0.5px solid var(--border); }
.again-btn {
  width:100%; padding:13px;
  font-size:14px; font-weight:500; font-family:inherit;
  letter-spacing:5px; border-radius:2px;
  border:0.5px solid var(--border);
  background:transparent; color:var(--text);
  cursor:pointer; transition:background .15s;
}
.again-btn:hover { background:rgba(0,0,0,.04); }
.again-btn:active { transform:scale(.98); }

#overlay {
  position:fixed; inset:0; z-index:100;
  background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  transition:opacity .4s;
}
.ov-title { font-size:32px; font-weight:600; letter-spacing:10px; color:var(--text); text-align:center; }
.ov-dots { display:flex; gap:7px; justify-content:center; margin-top:1.2rem; }
.dot { width:5px; height:5px; border-radius:50%; background:var(--border); animation:dotB .7s ease-in-out infinite; }
.dot:nth-child(2){animation-delay:.15s} .dot:nth-child(3){animation-delay:.3s}
@keyframes dotB{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
</style>
</head>
<body>

<div id="overlay">
  <div>
    <div class="ov-title">猫猫签</div>
    <div class="ov-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>
</div>

<div id="home">
  <div class="home-title">猫猫签</div>

  <div class="jar-wrap" id="jarWrap" onclick="doShake()">
    <div style="position:relative;width:130px;height:172px;">
      <svg id="jarSvg" class="bobbing" viewBox="0 0 130 172" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:130px;height:172px;display:block;">

        <!-- 签棒 5根，各色 -->
        <line x1="50" y1="38" x2="44" y2="5"  stroke="#C8A0A0" stroke-width="3" stroke-linecap="round"/>
        <line x1="62" y1="38" x2="57" y2="4"  stroke="#A0B8A0" stroke-width="3" stroke-linecap="round"/>
        <line x1="74" y1="38" x2="74" y2="3"  stroke="#A0A8C8" stroke-width="3" stroke-linecap="round"/>
        <line x1="86" y1="38" x2="91" y2="4"  stroke="#C8B890" stroke-width="3" stroke-linecap="round"/>
        <line x1="68" y1="38" x2="66" y2="3"  stroke="#B8A0C8" stroke-width="2.2" stroke-linecap="round"/>
        <!-- 签棒顶端彩色圆点 -->
        <circle cx="44" cy="5"  r="5" fill="#E87878"/>
        <circle cx="57" cy="4"  r="5" fill="#78B878"/>
        <circle cx="74" cy="3"  r="5" fill="#7898D8"/>
        <circle cx="91" cy="4"  r="5" fill="#D8B860"/>
        <circle cx="66" cy="3"  r="4" fill="#A878C8"/>

        <!-- 盖子：珊瑚橘色 -->
        <rect x="32" y="34" width="66" height="11" rx="5.5" fill="#E8A880"/>
        <rect x="36" y="24" width="58" height="13" rx="6.5" fill="#D89060"/>
        <rect x="40" y="26" width="28" height="5"  rx="2.5" fill="white" opacity=".28"/>

        <!-- 筒身：温暖奶油色，两侧用淡色块区分 -->
        <rect x="20" y="45" width="90" height="116" rx="16" fill="#F8EFE0"/>
        <!-- 筒身上段淡暖色 -->
        <rect x="20" y="45" width="90" height="36"  rx="16" fill="#F0E2C8" opacity=".8"/>
        <!-- 左高光 -->
        <rect x="27" y="52" width="5" height="102" rx="2.5" fill="white" opacity=".35"/>
        <!-- 右阴影 -->
        <rect x="98" y="52" width="4" height="102" rx="2"   fill="#C8A880" opacity=".22"/>

        <!-- 腰部装饰线：三条细线，淡淡的 -->
        <line x1="20" y1="100" x2="110" y2="100" stroke="#E0C8A8" stroke-width="0.8"/>
        <line x1="20" y1="104" x2="110" y2="104" stroke="#E0C8A8" stroke-width="0.5"/>

        <!-- 🐱 猫猫头：三花猫配色 -->
        <!-- 猫头主色：奶白 -->
        <circle cx="65" cy="116" r="28" fill="#F5ECD8"/>
        <!-- 猫头花斑：左橘 -->
        <ellipse cx="50" cy="108" rx="10" ry="8" fill="#E8A860" opacity=".7"/>
        <!-- 猫头花斑：右灰 -->
        <ellipse cx="79" cy="110" rx="9" ry="7" fill="#B8B0A8" opacity=".5"/>
        <!-- 额头小橘斑 -->
        <ellipse cx="65" cy="97"  rx="6"  ry="4" fill="#E8A860" opacity=".45"/>

        <!-- 耳朵左 -->
        <polygon points="40,97 33,74 52,88" fill="#F5ECD8"/>
        <polygon points="41,96 35,77 50,87" fill="#EABDA0" opacity=".8"/>
        <!-- 耳朵右 -->
        <polygon points="90,97 97,74 78,88" fill="#F5ECD8"/>
        <polygon points="89,96 95,77 80,87" fill="#EABDA0" opacity=".8"/>

        <!-- 眼睛：琥珀色 -->
        <ellipse cx="54"  cy="113" rx="6"   ry="6.5" fill="#2E3A2C"/>
        <ellipse cx="76"  cy="113" rx="6"   ry="6.5" fill="#2E3A2C"/>
        <!-- 眼睛内琥珀 -->
        <ellipse cx="54"  cy="113" rx="4"   ry="4.5" fill="#8B6020"/>
        <ellipse cx="76"  cy="113" rx="4"   ry="4.5" fill="#8B6020"/>
        <!-- 瞳孔 -->
        <ellipse cx="54"  cy="113" rx="2.2" ry="3.5" fill="#1A1A1A"/>
        <ellipse cx="76"  cy="113" rx="2.2" ry="3.5" fill="#1A1A1A"/>
        <!-- 眼睛高光 -->
        <circle  cx="56"  cy="111" r="1.8"  fill="white"/>
        <circle  cx="78"  cy="111" r="1.8"  fill="white"/>

        <!-- 鼻子：粉红 -->
        <ellipse cx="65" cy="122" rx="3"   ry="2.2" fill="#E89090"/>
        <!-- 嘴 -->
        <path d="M62 124.5 Q65 128.5 68 124.5" stroke="#C87878" stroke-width="1.4" stroke-linecap="round" fill="none"/>
        <!-- 胡须左 -->
        <line x1="38" y1="121" x2="59" y2="123" stroke="#C8B8A0" stroke-width="1.1" stroke-linecap="round"/>
        <line x1="37" y1="125" x2="59" y2="125" stroke="#C8B8A0" stroke-width="1.1" stroke-linecap="round"/>
        <!-- 胡须右 -->
        <line x1="92" y1="121" x2="71" y2="123" stroke="#C8B8A0" stroke-width="1.1" stroke-linecap="round"/>
        <line x1="93" y1="125" x2="71" y2="125" stroke="#C8B8A0" stroke-width="1.1" stroke-linecap="round"/>
        <!-- 腮红 -->
        <ellipse cx="44" cy="128" rx="9" ry="5.5" fill="#E87878" opacity=".2"/>
        <ellipse cx="86" cy="128" rx="9" ry="5.5" fill="#E87878" opacity=".2"/>

        <!-- 底部：深橘棕 -->
        <path d="M20 151 H110 V157 Q110 161 106 161 H24 Q20 161 20 157 Z" fill="#C88050"/>
      </svg>
      <div class="fly-sticks" id="flySticks"></div>
    </div>
    <div class="tap-hint">点一点签桶</div>
  </div>
</div>

<div id="result">
  <div class="result-card">
    <div class="card-top">
      <span class="res-num" id="resNum"></span>
      <span class="res-badge" id="resBadge"></span>
    </div>
    <div class="res-poem" id="resPoem"></div>
    <div class="card-section">
      <div class="sec-label">签　意</div>
      <div class="meaning-text" id="resMeaning"></div>
    </div>
    <div class="card-section">
      <div class="sec-label">断　事</div>
      <table class="dd-table" id="resDd"></table>
    </div>
    <div class="card-section">
      <div class="sec-label">箴　言</div>
      <div class="zhenyan" id="resZhenyan"></div>
    </div>
    <div class="again-wrap">
      <button class="again-btn" onclick="resetApp()">再摇一签</button>
    </div>
  </div>
</div>

<script>
const F=[
{"n": "第一签", "j": "大吉", "p": "七宝浮圆塔\n高峰顶上安\n众人皆仰望\n莫作等闲看", "m": "如以七宝所成的浮图宝塔，巍然立于高峰之巅，受众人仰望——你的存在与行事正被周围人所信任、认可。但越是得到高评价，越不可轻忽懈怠，需以谨慎庄重之心维持这份信赖。", "d": [{"k": "愿望", "v": "愿望可充分实现"}, {"k": "疾病", "v": "疾病可治愈"}, {"k": "失物", "v": "会找到，但稍晚"}, {"k": "待人", "v": "期待之人会出现"}, {"k": "迁居·建造", "v": "新建、搬家皆吉"}, {"k": "旅行·出行", "v": "旅行顺利"}, {"k": "婚嫁·交友", "v": "婚嫁、交友皆顺", "f": 1}], "z": "高处愈显，疏忽愈危。成功之时正是最需戒骄慎行之时，莫因受人仰望而忘乎所以，大意失守则意外灾祸随之而来。"},
{"n": "第二签", "j": "小吉", "p": "月被浮云翳\n立事自昏迷\n幸乞阴公祐\n何虑不开眉", "m": "皎洁明月被浮云遮蔽，眼前事业方向一时混沌迷离，难以看清。但若能真心诚意祈求观音菩萨庇佑、不懈为他人付出，终有云开月明之时，眉间忧色自然散去，幸福自会到来。", "d": [{"k": "愿望", "v": "坚持努力，终能实现"}, {"k": "疾病", "v": "病久，后续可康复"}, {"k": "失物", "v": "难以寻回"}, {"k": "待人", "v": "会来，但延迟"}, {"k": "迁居·建造", "v": "搬家、建造半吉"}, {"k": "旅行·出行", "v": "出行无碍"}, {"k": "婚嫁·交友", "v": "交友谨慎，姻缘平稳", "f": 1}], "z": "迷雾当前，不必慌乱。只要诚心待人、持续付出，神佛自会相护，前路终将豁然开朗，无须过虑。"},
{"n": "第三签", "j": "凶", "p": "愁恼损忠良\n青霄一炷香\n虽然防小过\n闲虑觉时长", "m": "忠诚良善之人反被愁苦所伤，付出之心得不到回报，向天祈祷的香烟也难以上达。即便如此，仍需防范细小过失，莫让忧虑虚耗光阴。此时是非不断、前路艰涩，需以守正之心忍耐蛰伏。", "d": [{"k": "愿望", "v": "愿望难成"}, {"k": "疾病", "v": "病久可愈"}, {"k": "失物", "v": "找寻困难"}, {"k": "待人", "v": "迟来相见"}, {"k": "迁居·建造", "v": "不宜营建改造"}, {"k": "旅行·出行", "v": "避免远行"}, {"k": "婚嫁·交友", "v": "婚恋交友须慎重", "f": 1}], "z": "逆境之中更当行善自守，防微杜渐，莫因烦恼而乱了分寸。静心等待时机，守得云开终见日出。"},
{"n": "第四签", "j": "吉", "p": "累有兴云志\n君恩禄未封\n若逢候手印\n好事始终始", "m": "心中久怀立身出世之志，虽尚未得到应有的封赏与认可，但若能清晰表达内心所想、主动展示才能，上位者自会看见，好事将接连不断涌来。机会就在于敢于开口、敢于亮相。", "d": [{"k": "愿望", "v": "愿望可实现，久有福报"}, {"k": "疾病", "v": "迟些时日可痊愈"}, {"k": "失物", "v": "迟寻可得"}, {"k": "待人", "v": "贵人将至"}, {"k": "迁居·建造", "v": "迁居建造顺利"}, {"k": "旅行·出行", "v": "出行小有阻碍"}, {"k": "婚嫁·交友", "v": "姻缘、交友顺遂", "f": 1}], "z": "怀才不遇非终局，清晰表达、主动出击，方能让贵人看见你的价值。好事总总，皆从勇于展示自我开始。"},
{"n": "第五签", "j": "凶", "p": "家道未能昌\n危危保祸殃\n暗云侵月桂\n佳人一炷香", "m": "家业经营艰难，难以兴旺繁盛，灾祸之气如暗云笼罩月桂，心情难以平静。此时无论如何努力，形势仍险象环生。唯有诚心向佛祈祷，方能在险境中求得一丝庇护。", "d": [{"k": "愿望", "v": "难以如愿"}, {"k": "疾病", "v": "难治难愈"}, {"k": "失物", "v": "无法找回"}, {"k": "待人", "v": "不会前来"}, {"k": "迁居·建造", "v": "不宜搬家动土"}, {"k": "旅行·出行", "v": "不宜外出"}, {"k": "婚嫁·交友", "v": "姻缘不利，交友慎行", "f": 1}], "z": "阴霾密布之时，强行冲撞只会加重损伤。静守本分，慎重行事，耐心等待乌云散去，切勿因焦躁而招致更大祸殃。"},
{"n": "第六签", "j": "末吉", "p": "宅墓凶凶多\n人事有爻讹\n伤财防损失\n祈福始中和", "m": "家宅之中潜藏不安，人事往来多有误解与摩擦，财物亦有损失之虞。事情推进迟缓，诸事不顺。然若能深化信仰、诚心祈福，尽力而为，最终仍可得中正平和之结果。", "d": [{"k": "愿望", "v": "久待可成，不宜心急"}, {"k": "疾病", "v": "恢复缓慢，需调养"}, {"k": "失物", "v": "难以找到"}, {"k": "待人", "v": "迟来相会"}, {"k": "迁居·建造", "v": "建造、搬家平平"}, {"k": "旅行·出行", "v": "出行顺利"}, {"k": "婚嫁·交友", "v": "姻缘不佳，交友留心", "f": 1}], "z": "家宅不宁、人事生误之时，切勿急躁强进。深化信仰、谨慎行事，神佛护佑之下，尽力而为自有转机。"},
{"n": "第七签", "j": "凶", "p": "登舟待便风\n月色暗朦胧\n欲碾香轮去\n高山千万重", "m": "已登船待发，却迟迟等不到顺风；月色暗淡朦胧，前途障碍重重如千万座高山横亘。此时强行出发只会触礁，任何冒进之举皆难成功。唯有静待天时，等风来时再扬帆。", "d": [{"k": "愿望", "v": "愿望难遂"}, {"k": "疾病", "v": "不易康复"}, {"k": "失物", "v": "找寻无望"}, {"k": "待人", "v": "故人不至"}, {"k": "迁居·建造", "v": "不宜改建迁居"}, {"k": "旅行·出行", "v": "切勿远行"}, {"k": "婚嫁·交友", "v": "婚恋、交友皆凶", "f": 1}], "z": "时机未到，强行推进只会碰壁。收帆静泊，等待顺风之日，蓄势而动，方能一帆风顺越过千山。"},
{"n": "第八签", "j": "大吉", "p": "勿头中见尾\n文华须得理\n禾刀自偶然\n当遇非常喜", "m": "不因小挫而放弃，坚持从头做到尾；文武兼修、才德并重，偶然之中自有天意眷顾。此签预示非同寻常的喜事将至，只要心正守道、全力以赴，幸福自然水到渠成。", "d": [{"k": "愿望", "v": "所求皆能如愿"}, {"k": "疾病", "v": "调养得当即可痊愈"}, {"k": "失物", "v": "顺利寻回"}, {"k": "待人", "v": "如期而至"}, {"k": "迁居·建造", "v": "安家建造大吉"}, {"k": "旅行·出行", "v": "出行稍加留意"}, {"k": "婚嫁·交友", "v": "姻缘圆满，相处和睦", "f": 1}], "z": "有始有终是成事之本，文武兼修是立身之道。守正不偏，偶然之喜便是天赐良机，非常之福从坚持中来。"},
{"n": "第九签", "j": "大吉", "p": "有名须得遇\n三望一朝迁\n贵人来指处\n华菓应时鲜", "m": "求名之人将得良机相遇，三个心愿一朝得还，贵人主动前来指引迷津。如四季花果应时而鲜，好运已然开启，各方面皆将迎来丰盛圆满之时。", "d": [{"k": "愿望", "v": "名利双收，诸事圆满"}, {"k": "疾病", "v": "疾病完全康复"}, {"k": "失物", "v": "失物易得"}, {"k": "待人", "v": "贵人相助相见"}, {"k": "迁居·建造", "v": "建房搬家大吉"}, {"k": "旅行·出行", "v": "出行平安无忧"}, {"k": "婚嫁·交友", "v": "姻缘美满，人脉兴旺", "f": 1}], "z": "努力求名，机缘自至；善加把握贵人指引，三愿可圆。如花果应时而盛，勤耕不辍者，收获终归丰饶。"},
{"n": "第十签", "j": "大吉", "p": "旧用多成破\n新更始见财\n改求云外望\n枯木遇春开", "m": "过去积累的旧模式已多破损难用，但正因如此，新的开始与财富得以涌现。放眼云外、追求更高远的目标，如枯木遇春，必将重焕生机、繁盛开放。革故鼎新，前途无量。", "d": [{"k": "愿望", "v": "愿望顺利实现"}, {"k": "疾病", "v": "病痛痊愈"}, {"k": "失物", "v": "速寻可得"}, {"k": "待人", "v": "期待之人必至"}, {"k": "迁居·建造", "v": "换屋改造大吉"}, {"k": "旅行·出行", "v": "旅途顺畅"}, {"k": "婚嫁·交友", "v": "感情和睦，交往长久", "f": 1}], "z": "旧事已破，正是新生之机。放下过去的执念，寻求更高远的方向，枯木逢春必繁盛，改变本身就是最大的财富。"},
{"n": "第十一签", "j": "大吉", "p": "有禄兴家业\n文华达帝都\n云中乘好箭\n兼得贵人扶", "m": "福禄与才华兼备，声名得以传达至高处；如利箭穿云直射，又得贵人从旁扶助，诸事顺遂，家业兴隆。此签大吉，才德之人终将在广阔舞台上大放光彩。", "d": [{"k": "愿望", "v": "心愿圆满达成"}, {"k": "疾病", "v": "病痛全消"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "贵人扶持相助"}, {"k": "迁居·建造", "v": "安家建房大吉"}, {"k": "旅行·出行", "v": "远行无碍"}, {"k": "婚嫁·交友", "v": "姻缘天赐，相处融洽", "f": 1}], "z": "才华与福禄并重，声名自然远达。得贵人相扶更上层楼，此时当乘势而为，勿妄自菲薄，大展所长。"},
{"n": "第十二签", "j": "大吉", "p": "杨柳遇春时\n残花发旧枝\n重重霜雪里\n黄金色更辉", "m": "杨柳逢春抽新芽，旧枝上的残花再度绽放。历经重重霜雪磨砺，黄金般的光辉反而愈发闪耀。过去的艰辛并非白费，正是那些苦难淬炼了如今的光彩，好运将长久延续。", "d": [{"k": "愿望", "v": "循序渐进，终能成真"}, {"k": "疾病", "v": "日渐好转康复"}, {"k": "失物", "v": "失而复得"}, {"k": "待人", "v": "稍迟方能相见"}, {"k": "迁居·建造", "v": "迁居改造吉利"}, {"k": "旅行·出行", "v": "出行一路顺畅"}, {"k": "婚嫁·交友", "v": "感情稳固，缘分深厚", "f": 1}], "z": "霜雪愈重，金光愈盛。莫忘来时艰辛，以诚实之心持续努力，历练所积之福，终将如黄金般经久不衰。"},
{"n": "第十三签", "j": "大吉", "p": "手把大阳辉\n东君发旧枝\n稼苗方欲秀\n犹更上云梯", "m": "手握太阳之辉，春神令旧枝再发，田间稻苗正欲抽穗茁壮——时机已然来临。把握当下奋力而为，步步高升如登云梯，前途一片光明，不可错失这天赐良机。", "d": [{"k": "愿望", "v": "万事皆能如愿"}, {"k": "疾病", "v": "顽疾可愈，元气复原"}, {"k": "失物", "v": "即刻寻获"}, {"k": "待人", "v": "故人贵人皆来"}, {"k": "迁居·建造", "v": "安家建造顺利"}, {"k": "旅行·出行", "v": "春夏出行大吉"}, {"k": "婚嫁·交友", "v": "婚恋美满，生活愉悦", "f": 1}], "z": "时机来临须果敢把握，犹豫则错失良机。如稻苗方秀、旧枝再发，此时持续努力，步步皆可更上层楼。"},
{"n": "第十四签", "j": "末吉", "p": "玉石未分时\n忧心转更悲\n前途通大道\n花发应残枝", "m": "玉与石尚难分辨，前路上烦恼与悲伤交织，真正的价值暂时无人识得。然而签中明示：前途终将通向大道，枯枝之上终有花开之日。此刻的困苦不过是黎明前的黑暗。", "d": [{"k": "愿望", "v": "耗时日久，终可达成"}, {"k": "疾病", "v": "病程绵长，无性命忧"}, {"k": "失物", "v": "难以找回"}, {"k": "待人", "v": "姗姗来迟"}, {"k": "迁居·建造", "v": "迁居建造普通"}, {"k": "旅行·出行", "v": "减少长途出行"}, {"k": "婚嫁·交友", "v": "前期坎坷，后期转好", "f": 1}], "z": "玉石难分之时，莫因暂时的不被认可而灰心丧志。苦劳过后，前途必通大道，枯枝终开花，耐心等待便是最好的坚守。"},
{"n": "第十五签", "j": "凶", "p": "年乖数亦孤\n久病未能苏\n岸危舟未发\n龙阴失明珠", "m": "年运乖离、处境孤立，久病难愈，如船停靠危岸无法出发，又如龙失去了照亮前路的宝珠。此时各方面皆处于最艰难之境，切不可强行妄动，应诚心祈求神佛庇护，静待转机。", "d": [{"k": "愿望", "v": "愿望渺茫难成"}, {"k": "疾病", "v": "病势沉重难愈"}, {"k": "失物", "v": "无法寻回"}, {"k": "待人", "v": "不会出现"}, {"k": "迁居·建造", "v": "不宜动土搬家"}, {"k": "旅行·出行", "v": "远行凶险"}, {"k": "婚嫁·交友", "v": "感情破裂，交友不和", "f": 1}], "z": "龙失明珠，不可强行觅路。此时诸事不宜，唯有诚心祈佑、安静蛰伏，待宝珠重现之日，方可重振出发。"},
{"n": "第十六签", "j": "吉", "p": "破改重成望\n前途喜亦宁\n贵人相助处\n禄马照前程", "m": "打破旧有格局、重新立志出发，前途便会展现喜兆与安宁。观音菩萨与贵人将给予助力，福禄如骏马般奔驰照亮前程。放下过去的包袱，重新出发，自然迎来光明。", "d": [{"k": "愿望", "v": "重新规划即可实现"}, {"k": "疾病", "v": "病痛消散安康"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "贵人及时相助"}, {"k": "迁居·建造", "v": "改造新居大吉"}, {"k": "旅行·出行", "v": "旅途平安顺遂"}, {"k": "婚嫁·交友", "v": "姻缘圆满，人脉和顺", "f": 1}], "z": "破旧立新，放下执念重新出发，前途方能豁然开朗。贵人相助非偶然，是因你已准备好迎接新的开始，福禄自然随行。"},
{"n": "第十七签", "j": "凶", "p": "佐异防忧恼\n人宅见分离\n惜华还值雨\n杯酒惹闲非", "m": "试图绕开危险，反而陷入更深的烦恼；家人有离散之忧，珍贵之事偏逢风雨阻挠，饮酒更会招惹无端是非。此时一切冒险举动皆适得其反，应静守正道，谨慎自持。", "d": [{"k": "愿望", "v": "所求难顺心意"}, {"k": "疾病", "v": "康复周期漫长"}, {"k": "失物", "v": "寻物无望"}, {"k": "待人", "v": "故人不至"}, {"k": "迁居·建造", "v": "不宜装修迁居"}, {"k": "旅行·出行", "v": "出行易招是非"}, {"k": "婚嫁·交友", "v": "感情波折，交友谨慎", "f": 1}], "z": "自作聪明寻捷径，往往陷入更深困境。静守正道、谨言慎行，尤需戒酒远离是非，守住本分方可避开祸端。"},
{"n": "第十八签", "j": "吉", "p": "离暗出明时\n麻衣变绿衣\n旧忧终是退\n遇禄应交辉", "m": "走出黑暗、迈向光明之时已来临，粗麻布衣换为翠绿新衣，象征命运的华丽转变。长久以来的悲忧终于消退，福禄降临，与你的善行相互辉映，美好的时代正式开启。", "d": [{"k": "愿望", "v": "心愿顺利达成"}, {"k": "疾病", "v": "百病消除痊愈"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "贵人扶持相见"}, {"k": "迁居·建造", "v": "搬家建房大吉"}, {"k": "旅行·出行", "v": "外出平安无事"}, {"k": "婚嫁·交友", "v": "婚恋和顺，人缘极佳", "f": 1}], "z": "黑暗终将过去，善行积累者必迎光明。麻衣换绿衣之日，正是你过去坚守的回报，福禄与诚心自然相辉映。"},
{"n": "第十九签", "j": "末小吉", "p": "家道生荆棘\n儿孙防虎威\n香前祈福厚\n方得免分离", "m": "家业之路荆棘丛生，子孙后辈需戒除骄傲自大之气、收敛锋芒。唯有在香案前诚心厚祷，以谦逊之心事奉神佛，方能化解家庭离散之危，守住家道根基。", "d": [{"k": "愿望", "v": "仅能达成半数心愿"}, {"k": "疾病", "v": "久病缠身，无生命危"}, {"k": "失物", "v": "大多寻不回"}, {"k": "待人", "v": "延迟相见"}, {"k": "迁居·建造", "v": "修建搬家平常"}, {"k": "旅行·出行", "v": "短途出行无碍"}, {"k": "婚嫁·交友", "v": "姻缘平淡，交友需防", "f": 1}], "z": "家道有阻时，子孙之傲气是最大隐患。诚心祈福、谦逊处世，方可免于离散之苦，荆棘之路终将被一寸寸清除。"},
{"n": "第二十签", "j": "吉", "p": "月出渐分明\n家财每每兴\n何言先有滞\n更变立功名", "m": "月亮渐渐明朗，家中财运一点一点兴旺，过去的滞碍已成往事。随着形势转变，扬名立功之机已然降临。顺势而为，积累之善行将转化为声望与财富。", "d": [{"k": "愿望", "v": "愿望稳步实现"}, {"k": "疾病", "v": "疾病痊愈安康"}, {"k": "失物", "v": "失物易寻"}, {"k": "待人", "v": "如期相见"}, {"k": "迁居·建造", "v": "迁居建造顺利"}, {"k": "旅行·出行", "v": "远行顺畅无忧"}, {"k": "婚嫁·交友", "v": "缘分顺遂，往来和睦", "f": 1}], "z": "月渐明，财渐丰，过去的阻碍已成积累的养分。顺应变化、把握时机，扬名立功非遥不可及，此时正是蓄势转运之机。"},
{"n": "第二十一签", "j": "吉", "p": "洗出经年否\n光华得再清\n所求终吉利\n重日照前程", "m": "多年积累的晦气与阴霾得以洗刷一空，本来的光华重新清亮显现。所求之事终将迎来吉利的结果，日复一日的积累让前程被阳光重新照耀，越来越明朗。", "d": [{"k": "愿望", "v": "万事皆可如愿"}, {"k": "疾病", "v": "可痊愈，切忌疏忽"}, {"k": "失物", "v": "顺利寻回"}, {"k": "待人", "v": "贵人将至"}, {"k": "迁居·建造", "v": "建房搬家无碍"}, {"k": "旅行·出行", "v": "工作出行皆安"}, {"k": "婚嫁·交友", "v": "婚姻安稳无忧", "f": 1}], "z": "日积月累终见清明，过去的晦暗是今日光华的代价。所求吉利非侥幸，而是岁月诚实积累的必然回报，重日照前程，步步皆有光。"},
{"n": "第二十二签", "j": "吉", "p": "渐渐浓云散\n看久月再明\n逢春华叶秀\n雨过竹重青", "m": "浓云一点一点散去，明月一步一步重现，春来花果欣欣向荣，雨过之后竹色愈发青翠——好事将重叠而来，但需要耐心等待这渐进的过程，急不得，也无需忧虑。", "d": [{"k": "愿望", "v": "耐心等待，心愿可成"}, {"k": "疾病", "v": "慢慢调养逐步康复"}, {"k": "失物", "v": "迟时可寻"}, {"k": "待人", "v": "故人相见"}, {"k": "迁居·建造", "v": "迁居建房顺利"}, {"k": "旅行·出行", "v": "诸事出行皆吉"}, {"k": "婚嫁·交友", "v": "交友相处融洽", "f": 1}], "z": "如雨后竹色愈青，好事重叠终将到来。此时无需焦急，渐进之运最为持久，耐心守候，一切自然向好。"},
{"n": "第二十三签", "j": "吉", "p": "红云随步起\n一箭中青霄\n鹿行千里远\n争知去路遥", "m": "吉兆随你每一步而起，箭矢直射青天，运势正旺。然而千里追鹿，鹿行路遥——切勿因一时好运便贪求过高目标，需诚实评估自身能力，量力而行方不失足。", "d": [{"k": "愿望", "v": "量力而行，终能如愿"}, {"k": "疾病", "v": "康复较为艰难"}, {"k": "失物", "v": "难以寻回"}, {"k": "待人", "v": "贵人可得相见"}, {"k": "迁居·建造", "v": "建造搬家顺利"}, {"k": "旅行·出行", "v": "出行稍加留意"}, {"k": "婚嫁·交友", "v": "婚恋生活安稳", "f": 1}], "z": "好运随行之时，最忌得意忘形、追求超出能力的目标。箭中青霄固然令人振奋，但千里之路须一步步走，诚实自知才是持续好运的根基。"},
{"n": "第二十四签", "j": "凶", "p": "三女莫相逢\n盟言说未通\n门里心肝挂\n缟素子重重", "m": "三女相聚生是非，口头盟约难以兑现，内心忧虑难以排解，不祥之事接连发生。此时人际关系复杂，言语承诺不可轻信，需以信仰之心明辨是非，不做有违天道人伦之事。", "d": [{"k": "愿望", "v": "愿望难以达成"}, {"k": "疾病", "v": "久病可愈，时日漫长"}, {"k": "失物", "v": "延迟方可寻回"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "不宜改造迁居"}, {"k": "旅行·出行", "v": "尽量避免远行"}, {"k": "婚嫁·交友", "v": "婚恋交友皆不利", "f": 1}], "z": "承诺易出口，履行却难。此时当明辨黑白、谨慎言行，不参与无谓的人际纷争，守住内心正道，方可免于接连不祥。"},
{"n": "第二十五签", "j": "吉", "p": "枯木逢春生\n前途必利亨\n亦得佳人箭\n乘车禄自行", "m": "枯木逢春，生机重焕，前途必然顺利亨通。良缘将至，如箭矢般准确相遇；福禄如车行顺路，自然而至。此签诸事皆宜，积累之善行将于此时结出丰硕果实。", "d": [{"k": "愿望", "v": "所求如愿，万事顺遂"}, {"k": "疾病", "v": "疾病完全治愈"}, {"k": "失物", "v": "失物易得"}, {"k": "待人", "v": "稍迟终会相逢"}, {"k": "迁居·建造", "v": "安家置业大吉"}, {"k": "旅行·出行", "v": "姻缘出行皆顺"}, {"k": "婚嫁·交友", "v": "交往和睦，缘分极佳", "f": 1}], "z": "枯木逢春，万物皆可复苏。前途亨通非偶然，是过去积善积德的自然回报，良缘与福禄皆将如车行顺路、水到渠成。"},
{"n": "第二十六签", "j": "吉", "p": "将军有异声\n进兵万里程\n争知临敌虏\n道胜却虚名", "m": "将军威名远播，率军万里出征，临敌之时奋勇争先——然而真正得道之胜，反而淡泊虚名，不以得胜自夸。目标虽可达成，但真正的价值不在名声，而在内心的充实与道义的完成。", "d": [{"k": "愿望", "v": "心愿顺利实现"}, {"k": "疾病", "v": "病痛消除健康"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "贵人相助常在"}, {"k": "迁居·建造", "v": "修建新居顺利"}, {"k": "旅行·出行", "v": "旅途一路平安"}, {"k": "婚嫁·交友", "v": "感情圆满，人脉广阔", "f": 1}], "z": "胜而不骄，得而不夸，方是真正的将军气度。即使功成名就，也当淡泊虚名，内心充实、道义完成才是真正的胜利。"},
{"n": "第二十七签", "j": "吉", "p": "望禄应重山\n花红喜悦颜\n举头看皎月\n渐出黑云间", "m": "翻越重重山岭终得福禄降临，红花盛开映照喜悦之颜。抬头仰望，皎皎明月正从乌云间渐渐探出——历尽艰辛后的幸福已近在眼前，但仍需时刻保持清醒，莫在此时大意疏忽。", "d": [{"k": "愿望", "v": "愿望稳步达成"}, {"k": "疾病", "v": "可痊愈，日常多保养"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "贵人如期而至"}, {"k": "迁居·建造", "v": "搬家建房大吉"}, {"k": "旅行·出行", "v": "远行极为顺利"}, {"k": "婚嫁·交友", "v": "婚恋圆满，相处甜蜜", "f": 1}], "z": "越过重山终见花红月明，艰辛之后的幸福最为真实。然皎月初现之时最忌放松警惕，保持清醒谨慎，幸福方能长久守住。"},
{"n": "第二十八签", "j": "凶", "p": "意速无船渡\n波深必误身\n切须回旧路\n方可免灾迍", "m": "心急欲渡，却无船可用；贸然涉入深波，必然误身受害。此签明告：须回归旧路、安守本分，方可免于灾难与困厄。一切强行冒进之举，皆将招致更大损失。", "d": [{"k": "愿望", "v": "强求无果，心愿难成"}, {"k": "疾病", "v": "长久休养方能好转"}, {"k": "失物", "v": "寻物无望"}, {"k": "待人", "v": "相见延迟"}, {"k": "迁居·建造", "v": "不宜动土迁居"}, {"k": "旅行·出行", "v": "杜绝长途出行"}, {"k": "婚嫁·交友", "v": "感情破裂，往来不和", "f": 1}], "z": "心急无船，强渡必溺。此时退守旧路、回归本分，并非退缩，而是最明智的自保之道，安静生活方能避开灾祸。"},
{"n": "第二十九签", "j": "吉", "p": "忧悁渐消融\n求名得再通\n宝财临禄位\n当遇主人公", "m": "长久积压的忧愁烦恼将渐渐消融，求名之路重新畅通无阻，财富与禄位接踵而至，贵人（主人公）亦将在此时现身相助。一切皆在好转，当下正是奋力作为的时机。", "d": [{"k": "愿望", "v": "心愿皆可达成"}, {"k": "疾病", "v": "疾病痊愈元气复"}, {"k": "失物", "v": "顺利寻回失物"}, {"k": "待人", "v": "贵人即刻相见"}, {"k": "迁居·建造", "v": "改造搬家顺利"}, {"k": "旅行·出行", "v": "外出工作平安"}, {"k": "婚嫁·交友", "v": "婚恋和睦，事事顺心", "f": 1}], "z": "忧愁消融之时，正是重新出发之机。尽力而为便能再度扬名，财富与贵人自然随之而来，莫因过去的忧苦而错失眼前的良机。"},
{"n": "第三十签", "j": "半吉", "p": "仙鹤立高枝\n防他暗箭亏\n井畔刚刀利\n户内更防危", "m": "仙鹤虽立于高枝，却需四面防范暗箭；井边刀锋锐利，家中亦有危机潜伏。外表看似安稳高雅，内部却危机四伏。此时不仅要防外部威胁，家庭内部同样需要时刻警觉。", "d": [{"k": "愿望", "v": "愿望难以即刻实现"}, {"k": "疾病", "v": "病情凶险难康复"}, {"k": "失物", "v": "难以找回"}, {"k": "待人", "v": "故人不至"}, {"k": "迁居·建造", "v": "需祈福方安稳"}, {"k": "旅行·出行", "v": "减少外出远行"}, {"k": "婚嫁·交友", "v": "感情谨慎，提防小人", "f": 1}], "z": "高处立足，暗箭难防。外患固然需防，家内之危更不可轻忽。居安思危、内外兼顾，方能守住这来之不易的立足之地。"},
{"n": "第三十一签", "j": "末吉", "p": "鲲鲸未变时\n且守碧潭溪\n风云兴巨浪\n一息过天涯", "m": "大鱼尚未化为鲲鹏，此时当守在碧潭之中静候时机，不可妄动。一旦风云际会、巨浪兴起，只需一口气便可飞越天涯——时机来临时的爆发力，正来自此刻的蛰伏积蓄。", "d": [{"k": "愿望", "v": "静待时机，后可圆梦"}, {"k": "疾病", "v": "康复困难重重"}, {"k": "失物", "v": "迟来可寻"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "迁居建造无碍"}, {"k": "旅行·出行", "v": "出行平安"}, {"k": "婚嫁·交友", "v": "婚恋交往尚可", "f": 1}], "z": "鲲鱼化鹏须待风云，蛰伏并非无为，而是积蓄能量。时机一到，一息可过天涯，此刻的静守正是将来大飞跃的根基。"},
{"n": "第三十二签", "j": "吉", "p": "似玉藏深石\n休将放眼看\n一朝良匠别\n方见宝光寒", "m": "宝玉深藏于顽石之中，以寻常眼光看去毫不起眼；唯有良匠识得，一经雕琢，宝光凛冽震人。你的才能正如这深藏之玉，持续磨砺，终有一日得遇伯乐，令众人刮目相看。", "d": [{"k": "愿望", "v": "心愿终会实现"}, {"k": "疾病", "v": "久病缠身，无生命忧"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "相见延迟"}, {"k": "迁居·建造", "v": "搬家建房顺利"}, {"k": "旅行·出行", "v": "旅途安稳无事"}, {"k": "婚嫁·交友", "v": "姻缘美满，交友靠谱", "f": 1}], "z": "真正的才能如玉藏深石，不被寻常眼光所识。莫因暂时无人赏识而自我怀疑，持续磨砺，良匠自会到来，宝光终将照耀世间。"},
{"n": "第三十三签", "j": "吉", "p": "枯木逢春艳\n芳菲再发林\n云间方见月\n前遇贵人欽", "m": "枯木逢春，再度艳丽绽放，芬芳之气重新弥漫林间；云开之处，皎月方现，前方贵人以钦佩之心相迎。如枯木般经历了漫长等待，终将迎来温暖的春天与赏识之人。", "d": [{"k": "愿望", "v": "所求皆能如愿"}, {"k": "疾病", "v": "百病痊愈身心畅"}, {"k": "失物", "v": "失物易得"}, {"k": "待人", "v": "贵人相逢助力"}, {"k": "迁居·建造", "v": "安家建房无阻"}, {"k": "旅行·出行", "v": "出行一路顺遂"}, {"k": "婚嫁·交友", "v": "感情甜蜜，人缘极佳", "f": 1}], "z": "枯木逢春，等待本身便是一种修炼。善人相助非偶然，是你在漫长蛰伏中守住正道的回报，耐心等待，喜事自然渐次而来。"},
{"n": "第三十四签", "j": "吉", "p": "腊木春将至\n芳菲喜再新\n鲲鲸兴巨浪\n举钩禄为真", "m": "冬日枯木，春天将至，芬芳之气喜悦地重新萌发；大鱼兴起巨浪，垂钓之人终得大禄——苦难将尽，好时机真实地到来。此刻奋力一搏，立身出世之时指日可待。", "d": [{"k": "愿望", "v": "愿望逐步达成"}, {"k": "疾病", "v": "疾病完全康复"}, {"k": "失物", "v": "延迟可寻回"}, {"k": "待人", "v": "相见稍晚"}, {"k": "迁居·建造", "v": "改造新居顺利"}, {"k": "旅行·出行", "v": "远行平安顺畅"}, {"k": "婚嫁·交友", "v": "婚恋圆满，收获幸福", "f": 1}], "z": "苦难将尽如冬去春来，奋力垂钓者终得大禄。此时不可懈怠，春风一至，全力以赴，大获成功之时真实可期。"},
{"n": "第三十五签", "j": "吉", "p": "射鹿须乘箭\n故僧引路归\n遇道同仙籍\n光华映晚晖", "m": "射鹿须凭弓箭，行路须有良师引导归正；与智慧之人同行，便如列于仙籍，光华自然映照晚霞余晖。跟随良师益友、遵循智者教诲，随着岁月沉淀，声望与光彩将自然提升。", "d": [{"k": "愿望", "v": "心愿顺利达成"}, {"k": "疾病", "v": "病痛消除健康"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "建房安家无碍"}, {"k": "旅行·出行", "v": "外出平安无忧"}, {"k": "婚嫁·交友", "v": "感情和睦，相处融洽", "f": 1}], "z": "射鹿凭箭，立世凭师。跟随良师益友、遵循智者之道，是最稳健的成长路径，岁月流逝，光华自然映照晚霞，愈老愈显。"},
{"n": "第三十六签", "j": "末吉", "p": "先损后有益\n如月之剥蚀\n玉兔待重生\n光华满室", "m": "先有损失，后有所得，如月经月蚀之后再度圆满——暂时的亏损并非终点，而是重生前的必经过程。玉兔等待重生，光华终将充满室内。耐心渡过这段阴暗期，圆满必至。", "d": [{"k": "愿望", "v": "先难后易，久待方成"}, {"k": "疾病", "v": "病程漫长终痊愈"}, {"k": "失物", "v": "难以找回"}, {"k": "待人", "v": "相见延迟"}, {"k": "迁居·建造", "v": "暂缓搬家改造"}, {"k": "旅行·出行", "v": "旅途易有不顺"}, {"k": "婚嫁·交友", "v": "婚恋交往多阻碍", "f": 1}], "z": "先损后益，如月蚀后再圆。此时的损失是重生的铺垫，莫因暂时亏损而绝望，耐心等待，光华满室之日终将到来。"},
{"n": "第三十七签", "j": "半吉", "p": "阴霭未能通\n求名亦未逢\n幸然须有变\n一箭中双鸿", "m": "东西南北皆被阴霾笼罩，求名之路尚未开通，时机未至。然而幸运的是，变化终将到来——一旦机会降临，便能一箭双雕，同时获得双重幸福。此刻当耐心守候，不可强行突破。", "d": [{"k": "愿望", "v": "短期难遂心愿"}, {"k": "疾病", "v": "慢慢调养渐好转"}, {"k": "失物", "v": "迟些可寻"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "迁居建造顺利"}, {"k": "旅行·出行", "v": "出行无碍"}, {"k": "婚嫁·交友", "v": "前期坎坷，后期和睦", "f": 1}], "z": "时机未到，阴霾犹在，切莫强行。一旦变化来临，一箭便可中双鸿——好事成双的回报，正是属于耐心等待之人。"},
{"n": "第三十八签", "j": "半吉", "p": "月照天书静\n云生雾彩霞\n久想离庭客\n无事惹咨嗟", "m": "月照天书，一片静谧安详，云生彩霞，景色美好——然而久思远方离家之人，无事之中反生叹息与烦恼。此签警示：心若不静，无事亦生愁。放下执念，心如明月般清净，困难自然消散。", "d": [{"k": "愿望", "v": "愿望难以实现"}, {"k": "疾病", "v": "康复速度缓慢"}, {"k": "失物", "v": "寻物无望"}, {"k": "待人", "v": "故人不会前来"}, {"k": "迁居·建造", "v": "居家运势平平"}, {"k": "旅行·出行", "v": "不宜长途旅行"}, {"k": "婚嫁·交友", "v": "暂缓婚恋交友规划", "f": 1}], "z": "心若执念不放，无事亦能生烦。学月照天书之静，放下对远人、远事的过度执着，清净之心自能化解一切无谓之忧。"},
{"n": "第三十九签", "j": "凶", "p": "望用方心腹\n家乡被火灾\n忧危三五度\n由损断头财", "m": "内心有所渴望，却无力付诸行动；家业如遭火灾般面临重大危机，忧患接连三五度袭来，重要财物与根基恐将失去。此时危机四伏，需极度谨慎，切勿冒险行动以免加速损失。", "d": [{"k": "愿望", "v": "所求皆难如愿"}, {"k": "疾病", "v": "病势危重预后差"}, {"k": "失物", "v": "无法寻回"}, {"k": "待人", "v": "贵人不至"}, {"k": "迁居·建造", "v": "严禁动土迁居"}, {"k": "旅行·出行", "v": "杜绝外出远行"}, {"k": "婚嫁·交友", "v": "感情破败，交友招祸", "f": 1}], "z": "内有所求却无力行动，外有火势步步逼近。此时最忌冒进，极度谨慎、保全根基才是当务之急，忧患三五度终将过去，根基在则东山可再起。"},
{"n": "第四十签", "j": "末小吉", "p": "中正方成道\n奸邪恐惹愆\n壶中盛妙药\n非久去烦煎", "m": "凡事不偏不倚、走中道正路，方能成就正道；心存邪念则必引来怨恨与祸端。然而签中也给出希望：壶中自有妙药，烦恼与煎熬不会长久，守正待时，困境终将消去。", "d": [{"k": "愿望", "v": "无法立刻圆梦"}, {"k": "疾病", "v": "久病可愈贵在静养"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "贵人如期相见"}, {"k": "迁居·建造", "v": "搬家建房顺利"}, {"k": "旅行·出行", "v": "出行平安顺畅"}, {"k": "婚嫁·交友", "v": "感情平淡，往来普通", "f": 1}], "z": "中道正路是最稳固的行事之基，邪心一动便招怨恨。守住正道、不失自我，壶中妙药自有其时，烦恼煎熬终将化解消散。"},
{"n": "第四十一签", "j": "末吉", "p": "有物不周旋\n须防损半边\n家乡烟火里\n祈福始安然", "m": "虽有所拥有，却难以充分运用，有时甚至面临亏损折半的风险。家中有火灾之忧，须充分警觉防范。唯有深信神佛、诚心祈福，以坚定之心守护家园，方可平安度过此段险期。", "d": [{"k": "愿望", "v": "愿望难以达成"}, {"k": "疾病", "v": "病势缠绵难愈"}, {"k": "失物", "v": "难以找回"}, {"k": "待人", "v": "相见极迟"}, {"k": "迁居·建造", "v": "不宜改造搬家"}, {"k": "旅行·出行", "v": "旅途多有不顺"}, {"k": "婚嫁·交友", "v": "婚恋交友皆不利", "f": 1}], "z": "拥有而不能善用，防损更胜于求得。家有火患之忧，信仰与警觉并行——诚心祈福，守护家园，安然自在方从此来。"},
{"n": "第四十二签", "j": "吉", "p": "桂华春将到\n云天好进程\n贵人相遇处\n暗月再分明", "m": "桂花飘香，春日将至，运势正在开启好时机。前路云天开阔，进展顺利。观音菩萨或贵人将在此时现身相助；阴暗的月色渐渐明朗，一切越来越好，把握此机缘，名誉地位皆可得。", "d": [{"k": "愿望", "v": "心愿顺利实现"}, {"k": "疾病", "v": "疾病痊愈身体健康"}, {"k": "失物", "v": "失物易得"}, {"k": "待人", "v": "贵人相逢助力"}, {"k": "迁居·建造", "v": "安家置业大吉"}, {"k": "旅行·出行", "v": "远行一路顺风"}, {"k": "婚嫁·交友", "v": "姻缘美满，人脉和顺", "f": 1}], "z": "春将至，桂香来，此时机缘不可错失。把握顺势的每一步，贵人自然相遇，暗月终将分明，前程越走越宽广。"},
{"n": "第四十三签", "j": "吉", "p": "月桂将相满\n追鹿映山溪\n贵人乘远箭\n好事始相宜", "m": "月桂渐趋圆满，如猎鹿映于山溪之中，时机正在临近。远方贵人如利箭飞来相助，凡事开头顺利，好事接连相宜。然此时切忌骄傲自大，戒骄戒躁方能守住这份好运。", "d": [{"k": "愿望", "v": "愿望皆可如愿"}, {"k": "疾病", "v": "久病慢养终康复"}, {"k": "失物", "v": "难以寻回"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "建造新居无阻"}, {"k": "旅行·出行", "v": "出行平安无事"}, {"k": "婚嫁·交友", "v": "婚恋顺遂生活幸福", "f": 1}], "z": "月渐圆，鹿将至，贵人远道而来，好事已在路上。此时戒骄最为紧要——骄傲是好运最大的敌人，谦逊守正方能让这份吉运延续长久。"},
{"n": "第四十四签", "j": "吉", "p": "盘中黑白子\n一著要先机\n天龙降甘泽\n洗出旧根基", "m": "棋盘之上黑白未定，人生吉凶尚在一着之间——凡事须先人一步，善恶分明方是正道。天龙降下甘霖，神佛之力洗去旧日积弊，本来的力量与才能得以重新发挥。", "d": [{"k": "愿望", "v": "心愿顺利达成"}, {"k": "疾病", "v": "百病消除身心安"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "相见稍晚"}, {"k": "迁居·建造", "v": "建房安家无碍"}, {"k": "旅行·出行", "v": "外出平安"}, {"k": "婚嫁·交友", "v": "感情和睦交往长久", "f": 1}], "z": "人生如棋，一着制胜在于先机。善恶须分明，旧弊须洗净，神佛甘霖降临之时，本来的力量自然得以充分展现。"},
{"n": "第四十五签", "j": "吉", "p": "有意兴高显\n禄马引前程\n得遇云中箭\n芝兰满路生", "m": "怀抱高远志愿，真心诚意则福禄如骏马引领前程；在神佛护佑之下，幸运的相遇如云中利箭般准确降临。如芝兰满路，善人环绕，名声自然传扬天下，所求皆有所得。", "d": [{"k": "愿望", "v": "愿望圆满实现"}, {"k": "疾病", "v": "病痛消散元气足"}, {"k": "失物", "v": "延迟可寻"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "改造新居大吉"}, {"k": "旅行·出行", "v": "旅途顺畅无忧"}, {"k": "婚嫁·交友", "v": "缘分极佳相处甜蜜", "f": 1}], "z": "志愿高远、善心真诚，福禄自引前程。芝兰满路非偶然，是因善人聚善人——善德积累者，前路自然芬芳无尽。"},
{"n": "第四十六签", "j": "凶", "p": "雷发震天昏\n佳人独掩门\n交加文书上\n无事也遭迍", "m": "雷鸣震天，暗云密布，令人忧虑不安；独自闭门自守，举步维艰。契约文书之事易生误差或引发诉讼；即便本无意惹事，也可能无端遭遇困难。此时凡事皆需格外谨慎小心。", "d": [{"k": "愿望", "v": "愿望难以实现"}, {"k": "疾病", "v": "疾病可以治愈"}, {"k": "失物", "v": "寻物无望"}, {"k": "待人", "v": "故人不至"}, {"k": "迁居·建造", "v": "不宜迁居建造"}, {"k": "旅行·出行", "v": "出行易遇波折"}, {"k": "婚嫁·交友", "v": "感情不和交友招非", "f": 1}], "z": "雷声已响，暗云密布，此时万事须谨慎。文书契约尤忌草率，切勿高估自身应对之力，低调自守、避开纠纷，方能减少无妄之灾。"},
{"n": "第四十七签", "j": "吉", "p": "更望身前立\n何期在晚成\n若过重山态\n财禄自相迎", "m": "渴望愿望早日实现，然而大器晚成乃天命之安排，不可操之过急。人生如重山叠叠，只要一步一步攀越，翻过山头之后，财富与禄位自然迎面而来，前景越来越开阔。", "d": [{"k": "愿望", "v": "愿望终会达成"}, {"k": "疾病", "v": "后期慢慢康复"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "搬家建房顺利"}, {"k": "旅行·出行", "v": "远行平安"}, {"k": "婚嫁·交友", "v": "婚恋和睦万事顺心", "f": 1}], "z": "大器晚成者，需有翻越重山的耐心与决心。莫因迟迟未至而急功近利，坚持攀越，财禄自在山的另一侧等候。"},
{"n": "第四十八签", "j": "小吉", "p": "见禄隔前溪\n劳心休更迷\n一朝逢好渡\n鸾凤入云飞", "m": "福禄近在眼前，却隔一道溪流难以企及；越是强求，越容易迷失方向。然而时机一旦来临，自然逢得好渡口，届时如凤凰飞入云霄，将一举出人头地，扶摇直上。", "d": [{"k": "愿望", "v": "坚守本心晚可成"}, {"k": "疾病", "v": "久病调养得痊愈"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "前期不顺后期吉"}, {"k": "旅行·出行", "v": "出行运势平平"}, {"k": "婚嫁·交友", "v": "姻缘向好交往融洽", "f": 1}], "z": "强求只会迷失，顺其自然方能渡溪得禄。平心静气、守正待时，凤凰入云之日自会到来，急不得，也等得到。"},
{"n": "第四十九签", "j": "吉", "p": "正好中秋月\n蟾蜍皎洁间\n暗云知何处\n故故两相攀", "m": "恰如十五中秋明月，运势充盈圆满；月中蟾蜍清晰可见，光辉澄澈。天空无云，心无邪念迷惑，内心清明无比。保持这份澄净之心，与志同道合之人携手并进，彼此相扶相攀。", "d": [{"k": "愿望", "v": "心愿圆满达成"}, {"k": "疾病", "v": "病情危重需谨慎"}, {"k": "失物", "v": "难以找回"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "居家运势普通"}, {"k": "旅行·出行", "v": "出行顺畅无事"}, {"k": "婚嫁·交友", "v": "感情平淡往来平和", "f": 1}], "z": "中秋月圆，澄明无云，内心清净是一切好运的根基。莫让杂念如暗云蔽月，与正直之人携手同行，共同攀登。"},
{"n": "第五十签", "j": "吉", "p": "有达宜更变\n重山利政逢\n前途相偶合\n财禄保亨通", "m": "要达成目标，须深刻理解其内涵，并勇于改变既有方法前行。如重山阻路，一旦下定决心，立即从当下位置出发行动，前途自然处处逢得良机，财富从始至终确实可得、亨通无碍。", "d": [{"k": "愿望", "v": "愿望顺利实现"}, {"k": "疾病", "v": "疾病完全康复"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "建造搬家大吉"}, {"k": "旅行·出行", "v": "旅途平安顺利"}, {"k": "婚嫁·交友", "v": "婚恋圆满富贵安稳", "f": 1}], "z": "理解透彻、决心改变、立即行动——此三者是突破重山的关键。变通非妥协，而是智慧；决心即出发，财禄自然亨通随行。"},
{"n": "第五十一签", "j": "吉", "p": "修进甚功辛\n劳生未得时\n腾身游碧汉\n方得遇高枝", "m": "勤奋修进，历尽艰辛，然而目前仍尚未到开花结果之时，努力之人须再忍耐一段。志向远大者，终将腾身游于碧空之间，遇上高枝，安居乐业，财富地位终归到手。", "d": [{"k": "愿望", "v": "愿望终可实现"}, {"k": "疾病", "v": "久病慢养后期痊愈"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "迁居建造顺利"}, {"k": "旅行·出行", "v": "出行平安"}, {"k": "婚嫁·交友", "v": "婚恋交往和顺", "f": 1}], "z": "勤奋之人时机未到时最需忍耐，此刻的辛苦是腾身碧汉的必要铺垫。大志者不急于一时，高枝终将在适当之时等候你的到来。"},
{"n": "第五十二签", "j": "凶", "p": "有偬须惹讼\n兼有事交加\n门里防人厄\n灾临莫叹嗟", "m": "身有过失，易招诉讼与争执；麻烦事件接连叠加，根源往往在于亲属或家庭内部。即便灾难降临，也须沉着应对，莫只知哀叹。家庭和睦是解决一切的根本，需从此处着手。", "d": [{"k": "愿望", "v": "愿望难以达成"}, {"k": "疾病", "v": "病程绵长难好转"}, {"k": "失物", "v": "无法寻回"}, {"k": "待人", "v": "贵人不至"}, {"k": "迁居·建造", "v": "居家运势平平"}, {"k": "旅行·出行", "v": "尽量避免远行"}, {"k": "婚嫁·交友", "v": "感情平淡交友谨慎", "f": 1}], "z": "有过则改，家庭和睦为先。纠纷诉讼多从内部矛盾而起，莫等灾临才嗟叹，从今日起修和家室，方能釜底抽薪化解外患。"},
{"n": "第五十三签", "j": "吉", "p": "久困渐能安\n云书降印权\n残花终结实\n时亨禄自迁", "m": "长期的困苦终将渐渐平息，上位者将赐予正式的认可与权力；残花尽管凋零，最终仍能结出果实，运势终归到来。福禄归还，升进之路已然开启，幸福安乐将伴随终老。", "d": [{"k": "愿望", "v": "心愿逐步达成"}, {"k": "疾病", "v": "疾病痊愈复健康"}, {"k": "失物", "v": "延迟可寻"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "建房安家无阻"}, {"k": "旅行·出行", "v": "外出一路平安"}, {"k": "婚嫁·交友", "v": "婚恋和睦缘分长久", "f": 1}], "z": "久困之人，残花亦能结实。坚持等待、不轻言放弃，上位者的认可终将降临，福禄回归之时，一切苦劳皆化为人生厚实的根基。"},
{"n": "第五十四签", "j": "凶", "p": "身同意不同\n月蚀暗长空\n轮虽常在手\n鱼水未相逢", "m": "身处其中，内心却与外境格格不入；如月蚀般，黑暗笼罩长空，判断力受损。虽有工具在手却无法前行，好事近在眼前却如鱼离水，始终无法到手。须平心静气，顺应时势。", "d": [{"k": "愿望", "v": "所求皆难如愿"}, {"k": "疾病", "v": "病势危重预后忧"}, {"k": "失物", "v": "寻物无望"}, {"k": "待人", "v": "故人不至"}, {"k": "迁居·建造", "v": "严禁改造迁居"}, {"k": "旅行·出行", "v": "杜绝长途出行"}, {"k": "婚嫁·交友", "v": "感情破裂三观不合", "f": 1}], "z": "身在局中，心却游离，是此时最大的困境。平心静气，莫逆势强求；鱼终会遇水，事终会有时，顺应而非对抗，方是解困之道。"},
{"n": "第五十五签", "j": "吉", "p": "云散月重明\n天书得志诚\n虽然多阻滞\n花发再重荣", "m": "遮月之云渐渐散去，月光重现明亮；诚心之人将获天书认可。即便途中多有阻滞，也不会成为不可逾越的障碍，花朵终将重叠盛开，子孙繁荣，一切向好。", "d": [{"k": "愿望", "v": "愿望顺利实现"}, {"k": "疾病", "v": "百病消除全痊愈"}, {"k": "失物", "v": "失物易得"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "搬家建房大吉"}, {"k": "旅行·出行", "v": "远行顺畅无忧"}, {"k": "婚嫁·交友", "v": "姻缘美满人脉兴旺", "f": 1}], "z": "云散则月明，诚心则天应。途中阻滞并非终止，而是花开前的蓄积；坚守正道、诚心以待，花发重荣之日必将到来。"},
{"n": "第五十六签", "j": "末小吉", "p": "生涯喜又忧\n未老先白头\n劳心千百度\n方遇贵人留", "m": "喜忧交替贯穿生涯，劳心过度令人未老先白头。然而历经千百度的辛劳之后，观音菩萨或贵人终将现身留步相助，给予力量。苦尽之后，幸福虽来得迟，却是真实可得的。", "d": [{"k": "愿望", "v": "愿望难速成"}, {"k": "疾病", "v": "久病缠身终痊愈"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "居家运势普通"}, {"k": "旅行·出行", "v": "结伴出行为宜"}, {"k": "婚嫁·交友", "v": "感情平淡往来寻常", "f": 1}], "z": "白头早生是劳心过度的警示，须学会放下部分重担。历经千百苦，贵人终会留步——此签告诉你：你的坚持没有白费，幸福在苦劳的尽头等候。"},
{"n": "第五十七签", "j": "吉", "p": "欲渡长江阔\n波深未自俦\n前津逢浪静\n重整钩繁钩", "m": "渴望渡过宽阔长江，波浪汹涌令人望而却步。然而等待到前方渡口浪静之时，从容整理好钓具，大鱼终将上钩，好运如期而至。此签要义在于：等候时机，而非硬闯。", "d": [{"k": "愿望", "v": "愿望静待时机可成"}, {"k": "疾病", "v": "久病调养得痊愈"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "迁居建造顺利"}, {"k": "旅行·出行", "v": "不宜独自远行"}, {"k": "婚嫁·交友", "v": "婚恋平淡交友普通", "f": 1}], "z": "宽江不可强渡，须等浪静方行。此时耐心整备、蓄势待发，前津浪静之日，大鱼上钩，好运不请自来。"},
{"n": "第五十八签", "j": "凶", "p": "有径江海隔\n车行峻岭危\n亦防多进退\n犹恐小人亏", "m": "道路被江海阻断，推车上险峻山岭，举步维艰；进退之间皆有危险，小人暗中作祟更添困境。此时任何轻举妄动皆易雪上加霜，需极度谨慎，防范小人，静观其变。", "d": [{"k": "愿望", "v": "愿望难以达成"}, {"k": "疾病", "v": "康复艰难久病难愈"}, {"k": "失物", "v": "无法寻回"}, {"k": "待人", "v": "贵人不至"}, {"k": "迁居·建造", "v": "不宜动土搬家"}, {"k": "旅行·出行", "v": "出行危险重重"}, {"k": "婚嫁·交友", "v": "婚恋不利谨防小人", "f": 1}], "z": "江海阻路，险岭难行，小人伺机——此时行事需步步为营。进退皆防，最忌轻信他人；静观待变，待险势稍退再徐徐图之。"},
{"n": "第五十九签", "j": "凶", "p": "去住心无定\n行藏亦未宁\n一轮清皎洁\n却被黑云乘", "m": "去与留之间游移不定，行动与退守皆无法安宁；内心本有一轮清澈皎月，却被迷惘的黑云所遮蔽。此时最重要的是找回本心——驱散内心的迷云，方能重见清明，做出正确判断。", "d": [{"k": "愿望", "v": "所求难遂心意"}, {"k": "疾病", "v": "病情危重凶险"}, {"k": "失物", "v": "寻物无望"}, {"k": "待人", "v": "故人不至"}, {"k": "迁居·建造", "v": "严禁改造迁居"}, {"k": "旅行·出行", "v": "出行易生祸端"}, {"k": "婚嫁·交友", "v": "感情动荡交往不和", "f": 1}], "z": "迷云蔽月，皆因心中无定。找回本心、驱散迷惘，才是此时唯一的解法；心若清明，去住自明，进退自有答案。"},
{"n": "第六十签", "j": "小吉", "p": "高危安可涉\n平坦是延年\n守道当逢泰\n风云不偶然", "m": "高险之处不可轻涉，过于显眼反而招来风险；平坦安稳的生活才是延年益寿之道。守住正确的生活方式，自可安泰平和——风云变幻并非偶然，正直之人自有天道庇护。", "d": [{"k": "愿望", "v": "坚守正道便可成"}, {"k": "疾病", "v": "久病慢养得痊愈"}, {"k": "失物", "v": "难以找回"}, {"k": "待人", "v": "贵人不至"}, {"k": "迁居·建造", "v": "不宜大兴土木"}, {"k": "旅行·出行", "v": "出行运势平平"}, {"k": "婚嫁·交友", "v": "婚恋平淡安稳为主", "f": 1}], "z": "平凡之道非平庸，而是长寿安乐的智慧。高处风险难测，守道平坦者，风云变化中自有天道护佑，安泰非侥幸，是正直之人应得的回报。"},
{"n": "第六十一签", "j": "半吉", "p": "旧愆何日解\n户内保婵始\n要逢十一口\n遇鼠过牛边", "m": "过去的过失何时能够化解，内心忧虑难安。家中纳美、保持和睦，需反省自身生活方式。\"十一口\"合为\"吉\"字，努力则必遇吉祥；即便艰难之时，也要如勤奋之人般不懈工作。", "d": [{"k": "愿望", "v": "短期难以实现"}, {"k": "疾病", "v": "病势缠绵难愈"}, {"k": "失物", "v": "难以寻回"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "不宜装修迁居"}, {"k": "旅行·出行", "v": "减少外出远行"}, {"k": "婚嫁·交友", "v": "婚恋交往多不顺", "f": 1}], "z": "过失不解，忧虑难消。从今日起反省自身、修和家室，勤奋努力终遇吉祥——\"吉\"字就藏在坚持的日常之中，莫因过去而停下当下的步伐。"},
{"n": "第六十二签", "j": "大吉", "p": "灾轆时时退\n名显四方杨\n改故重乘禄\n昻高福自昌", "m": "灾难渐渐退去，运势重新开启。名声传遍四方，善意广为人知。革除旧习、重新承载福禄，昂首向上则福运兴盛繁荣。此乃大吉之签，革故鼎新之时，一切皆将蓬勃向上。", "d": [{"k": "愿望", "v": "心愿圆满达成"}, {"k": "疾病", "v": "疾病完全康复"}, {"k": "失物", "v": "失物易得"}, {"k": "待人", "v": "贵人即刻相见"}, {"k": "迁居·建造", "v": "建造新居大吉"}, {"k": "旅行·出行", "v": "旅途一路顺风"}, {"k": "婚嫁·交友", "v": "姻缘美满名声在外", "f": 1}], "z": "灾退名扬，革旧迎新，此时正是全力出发的最好时机。昂首向上则福自昌——大吉之运已至，莫谦让错失，勇往直前，福运愈走愈盛。"},
{"n": "第六十三签", "j": "凶", "p": "何故生荆棘\n佳人意渐疏\n久困重轮下\n黄金未出渠", "m": "家中无端问题丛生，家人或夫妻之间渐渐疏远；若不深究根源加以反省，将长期被重轮压困，挥霍的财产亦难以复原。忠实守职、反省自身，才是走出困境的唯一出路。", "d": [{"k": "愿望", "v": "愿望渺茫难成"}, {"k": "疾病", "v": "顽疾难愈康复难"}, {"k": "失物", "v": "无法寻回"}, {"k": "待人", "v": "故人不至"}, {"k": "迁居·建造", "v": "不宜安家建房"}, {"k": "旅行·出行", "v": "出行多有阻碍"}, {"k": "婚嫁·交友", "v": "感情疏离缘分浅", "f": 1}], "z": "荆棘自生，多因内部失和与自我疏忽。莫只怪外因，深查根源、反省自身，守职勤业、莫再挥霍，困局方能从内部逐步化解。"},
{"n": "第六十四签", "j": "凶", "p": "安居且虑危\n情深主别离\n风飘波浪急\n鸳鸯各自飞", "m": "看似安居乐业，内心却隐藏危机；与情深之人面临离别之悲，风急浪高处境如风中飘荡，鸳鸯各自分飞。此时切勿强求挽留，静心等待，以诚心守候是非之时终会过去。", "d": [{"k": "愿望", "v": "所求皆难如愿"}, {"k": "疾病", "v": "久病难愈身体弱"}, {"k": "失物", "v": "寻物无望"}, {"k": "待人", "v": "贵人不至"}, {"k": "迁居·建造", "v": "居家运势平平"}, {"k": "旅行·出行", "v": "出行平淡无奇"}, {"k": "婚嫁·交友", "v": "离别之象婚恋不利", "f": 1}], "z": "居安须思危，情深莫强求。风急浪高之时，强行相挽只会两败俱伤；静心等候，以诚心守住本分，鸳鸯分飞之后终有重聚之日。"},
{"n": "第六十五签", "j": "末吉", "p": "苦病兼防辱\n乘危亦未苏\n若见一阳后\n方可作良图", "m": "身心俱苦，又受人侮辱；危险尚未完全解除，困难难以立即化解。然而签中明示：待到一阳来复（如观音菩萨慈悲之光照临），良事将至，届时方可展开新的良好规划，耐心等待好时机。", "d": [{"k": "愿望", "v": "先苦后甜终圆梦"}, {"k": "疾病", "v": "久病缠身慢慢痊愈"}, {"k": "失物", "v": "难以找回"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "搬家建造顺利"}, {"k": "旅行·出行", "v": "远行平安无事"}, {"k": "婚嫁·交友", "v": "感情平淡暂缓强求", "f": 1}], "z": "苦病加辱，此时不可强行图谋。等待一阳来复，是最务实的坚守——慈悲之光终将照临，耐心守候，方可在时机成熟之时展开良图。"},
{"n": "第六十六签", "j": "凶", "p": "水滞少波涛\n飞鸿落羽毛\n重忧心绪乱\n闲事惹风骚", "m": "水流停滞不前，社会活动受阻；大雁失去羽毛，无力飞翔，重要之物已然失去。悲事接连而来，心绪混乱迷途；明明想求安静，偏偏无端惹来大麻烦。需静心自持，避免一切无谓纷争。", "d": [{"k": "愿望", "v": "愿望难以实现"}, {"k": "疾病", "v": "康复缓慢久病难安"}, {"k": "失物", "v": "无法寻回"}, {"k": "待人", "v": "故人不至"}, {"k": "迁居·建造", "v": "居家运势低迷"}, {"k": "旅行·出行", "v": "杜绝长途出行"}, {"k": "婚嫁·交友", "v": "交友招非感情不顺", "f": 1}], "z": "水滞鸿落，此时强行只会徒耗心力。静心自持、远离无谓纷争，是保存实力的唯一之道；待水流重启，羽翼复生，自然重振翱翔。"},
{"n": "第六十七签", "j": "凶", "p": "枯木未生枝\n独步上云岐\n岂知身未稳\n独自惹闲非", "m": "枯木久等，新枝迟迟未发，春天尚未到来。妄想独自攀高只会更加迷惘不安；自身根基尚不稳固，却惹来是非麻烦。需深刻认清自身现状，戒骄守正，反省过去之失。", "d": [{"k": "愿望", "v": "所求难遂心意"}, {"k": "疾病", "v": "病势绵长难愈"}, {"k": "失物", "v": "寻物无望"}, {"k": "待人", "v": "贵人不至"}, {"k": "迁居·建造", "v": "不宜动土迁居"}, {"k": "旅行·出行", "v": "不宜外出远行"}, {"k": "婚嫁·交友", "v": "婚恋不利孤身无援", "f": 1}], "z": "枯木未发枝，根基未稳之时最忌妄想高攀。独步上云岐只会迷失于是非之中，认清自身处境、戒骄守正，静待春风才是正道。"},
{"n": "第六十八签", "j": "吉", "p": "异梦生英杰\n前来事可疑\n芳菲春日暖\n依旧发残枝", "m": "梦见英杰，是神佛护佑的吉兆；昨日与今日相比，运势发生了令人惊喜的好转。春暖花香，幸运如约而来；枯枝之上也重新开花，昔日的困境将迎来意想不到的喜悦与转机。", "d": [{"k": "愿望", "v": "愿望顺利达成"}, {"k": "疾病", "v": "百病消除身体健"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "贵人如期相见"}, {"k": "迁居·建造", "v": "改造新居大吉"}, {"k": "旅行·出行", "v": "出行平安顺畅"}, {"k": "婚嫁·交友", "v": "感情和睦缘分回暖", "f": 1}], "z": "信仰护佑者，往往在意想不到之处迎来转机。枯枝亦能开花，昨日之困是今日之花的底色，以信心守候，好运自来。"},
{"n": "第六十九签", "j": "凶", "p": "明月暗云浮\n花红一半枯\n惹事伤心处\n行舟莫远图", "m": "明月被厚云遮蔽，始终无法晴朗；红花已有一半凋零，运势正在下坡。事情难以成就，劳心伤神。此时切不可妄图远航冒险，需收敛欲望，慎重等待时机，静候转机。", "d": [{"k": "愿望", "v": "愿望难以达成"}, {"k": "疾病", "v": "病情凶险需养护"}, {"k": "失物", "v": "无法寻回"}, {"k": "待人", "v": "故人不至"}, {"k": "迁居·建造", "v": "严禁装修搬家"}, {"k": "旅行·出行", "v": "不宜长途跋涉"}, {"k": "婚嫁·交友", "v": "感情伤感缘分破败", "f": 1}], "z": "暗云未散，红花半枯，此时远图只会加速损耗。收敛欲望、静待时机，是当下最明智的选择；时机未至，守住现有才是最好的远谋。"},
{"n": "第七十签", "j": "凶", "p": "雷发庭前草\n炎火向天飞\n一心来趋禄\n争奈掩朱扉", "m": "庭前落雷，象征下属或使用人带来损害；炎火飞天，上下关系失和，争执不断。一心求取利禄，门扉却紧闭无法得入。须善待部下、修复上下关系，防范由内部失和而来的灾难。", "d": [{"k": "愿望", "v": "所求皆难如愿"}, {"k": "疾病", "v": "久病难愈燥热缠"}, {"k": "失物", "v": "寻物无望"}, {"k": "待人", "v": "贵人不至"}, {"k": "迁居·建造", "v": "不宜建造迁居"}, {"k": "旅行·出行", "v": "出行工作皆不利"}, {"k": "婚嫁·交友", "v": "婚恋交往矛盾多", "f": 1}], "z": "雷火皆从内部失和而起。善待下属、修复上下关系，是化解一切危机的根本；门扉紧闭非外因，和谐人心方能打开通往福禄之门。"},
{"n": "第七十一签", "j": "凶", "p": "道业未成时\n何期两不宜\n事烦心绪乱\n翻作徘徊思", "m": "心智与事业皆尚未成熟，现在正是学习积累的时期，此时做什么都难如意。各种麻烦接连引发，苦不堪言，思虑不定、游荡徘徊。需静下心来深刻反省，打好根基再图出发。", "d": [{"k": "愿望", "v": "愿望难以实现"}, {"k": "疾病", "v": "病势缠绵难愈"}, {"k": "失物", "v": "无法寻回"}, {"k": "待人", "v": "故人不至"}, {"k": "迁居·建造", "v": "不宜改造迁居"}, {"k": "旅行·出行", "v": "减少外出远行"}, {"k": "婚嫁·交友", "v": "感情纠结交往内耗", "f": 1}], "z": "道业未成，学习才是此时的本务。思虑纷乱、徘徊不前，皆因根基未实；静心反省、戒骄戒躁，打好根基，一切烦事自会随之化解。"},
{"n": "第七十二签", "j": "吉", "p": "户内防重厄\n花菓见分枝\n严霜过后\n方可始相宜", "m": "家中有重重灾厄将临，需提高警觉加以防范；花果各自分枝，家庭之间有不和之象。然而严冬过后，事情将逐渐好转；家内和合、善事积累，终将迎来相宜的春天。", "d": [{"k": "愿望", "v": "愿望终能实现"}, {"k": "疾病", "v": "病程绵长慢慢好转"}, {"k": "失物", "v": "延迟可寻"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "居家运势普通"}, {"k": "旅行·出行", "v": "出行无碍顺畅"}, {"k": "婚嫁·交友", "v": "先苦后甜感情稳固", "f": 1}], "z": "严霜虽重，终将过去。此时防范家中灾厄、修和家室是首务；内部和合者，自然能够渡过严冬，迎来花果满枝的春日。"},
{"n": "第七十三签", "j": "吉", "p": "久暗渐分明\n登江绿水澄\n芝书从远降\n终得异人成", "m": "久阴的天空终于渐渐晴朗，绿水澄清，心无忧虑；上位者从远处赐下推荐书，神佛相助，良缘贵人终将促成良好结果。此时需鼓起信心，勇敢接受这份从天而降的机缘。", "d": [{"k": "愿望", "v": "阴霾散尽愿望可成"}, {"k": "疾病", "v": "疾病痊愈身心安"}, {"k": "失物", "v": "延迟可寻"}, {"k": "待人", "v": "贵人即刻相见"}, {"k": "迁居·建造", "v": "搬家建房顺利"}, {"k": "旅行·出行", "v": "远行平安无忧"}, {"k": "婚嫁·交友", "v": "婚恋美满贵人牵缘", "f": 1}], "z": "久暗终明，绿水自澄。上位者的认可与贵人的助力终将从远处降临，此时最需要的是鼓起信心迎接——机缘来时，自信之人方能接住。"},
{"n": "第七十四签", "j": "凶", "p": "蛇虎正交罗\n牛生二尾多\n交岁方成庆\n上下不能和", "m": "蛇虎交错，局势错乱，道理不通，坏事频发；一牛生二尾，有损失分裂之兆。即便有喜庆之事，也因争执不断而难以真心庆贺，上下失和、家庭不睦，需以忍耐调和化解矛盾。", "d": [{"k": "愿望", "v": "愿望难以达成"}, {"k": "疾病", "v": "康复艰难久病缠"}, {"k": "失物", "v": "无法寻回"}, {"k": "待人", "v": "故人不至"}, {"k": "迁居·建造", "v": "不宜动土迁居"}, {"k": "旅行·出行", "v": "不宜外出远行"}, {"k": "婚嫁·交友", "v": "人际不和感情矛盾", "f": 1}], "z": "蛇虎交错之时，强行争论只会加剧混乱。忍耐与调和是此时唯一出路；上下和睦、化解矛盾，局势自然从乱中归于正轨。"},
{"n": "第七十五签", "j": "凶", "p": "孤舟欲过岸\n浪急渡人空\n女人立流水\n望月意情浓", "m": "孤舟独力难渡，急流之中无人相助；女子立于急流之中，处境十分危险。羡慕他人的安乐只会加重自身的失落，此时需反省自身行动、诚心祈求神佛护佑，莫以他人比照自己。", "d": [{"k": "愿望", "v": "所求难遂心意"}, {"k": "疾病", "v": "病情危重性命忧"}, {"k": "失物", "v": "寻物无望"}, {"k": "待人", "v": "贵人不至"}, {"k": "迁居·建造", "v": "严禁安家建造"}, {"k": "旅行·出行", "v": "杜绝长途出行"}, {"k": "婚嫁·交友", "v": "孤单无依缘分浅", "f": 1}], "z": "孤舟急浪，此时最忌勉强独行与羡慕他人。反省自身、祈求神佛，是此刻最实际的行动；待浪稍平，再徐徐图渡。"},
{"n": "第七十六签", "j": "吉", "p": "富贵天之祐\n何须苦用心\n前程应显迹\n久用得高临", "m": "真正的富贵是天道赐予的，根源在于你长期以来所积累的善行。单凭苦心钻营难以奏效，唯有持续走正道，地位自然提高，财富自然到手，前程之迹终将显现，高处自然可临。", "d": [{"k": "愿望", "v": "愿望顺其自然可成"}, {"k": "疾病", "v": "百病痊愈元气复"}, {"k": "失物", "v": "失物易得"}, {"k": "待人", "v": "贵人如期相见"}, {"k": "迁居·建造", "v": "建造新居大吉"}, {"k": "旅行·出行", "v": "旅途顺畅平安"}, {"k": "婚嫁·交友", "v": "姻缘安稳富贵和睦", "f": 1}], "z": "富贵非钻营所得，而是正道长期积累的天然回报。久行善道、真心诚意，天道自有安排，前程之迹终将显现，高临者必是久守正道之人。"},
{"n": "第七十七签", "j": "凶", "p": "累滞未能稣\n求名莫远图\n轮虽常在手\n鱼水未相逢", "m": "万事阻滞不前，前途不明；此时切不可妄求名利、超出自身实际能力。波浪高涌，船行艰难；看似咫尺之间，实则如隔天堑。须自重自持，量力而行，静候时机方为正道。", "d": [{"k": "愿望", "v": "愿望难以实现"}, {"k": "疾病", "v": "久病难愈体质弱"}, {"k": "失物", "v": "无法寻回"}, {"k": "待人", "v": "故人不至"}, {"k": "迁居·建造", "v": "不宜改造迁居"}, {"k": "旅行·出行", "v": "不宜外出远行"}, {"k": "婚嫁·交友", "v": "感情不合缺少默契", "f": 1}], "z": "咫尺如天堑，强求只会溺于浪中。自重自持、量力而行，此时最重要的是认清自身现状，静候时机，待浪平路开，再徐徐向前。"},
{"n": "第七十八签", "j": "大吉", "p": "但存公道正\n何愁理去忠\n松柏苍苍翠\n前山禄马重", "m": "守住公正之道、为众人行善，忠心尽力无怨无悔；如松柏常青不凋，诚信之心经得住岁月考验。前路福德丰盈，禄马重重而来，幸福长久到来，此乃守正之人应得的大吉回报。", "d": [{"k": "愿望", "v": "坚守正道万事皆成"}, {"k": "疾病", "v": "疾病完全康复"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "贵人即刻相见"}, {"k": "迁居·建造", "v": "搬家建房大吉"}, {"k": "旅行·出行", "v": "出行一路顺风"}, {"k": "婚嫁·交友", "v": "婚恋忠贞交友靠谱", "f": 1}], "z": "公正守道、忠诚如松柏，是此签最核心的人生智慧。行善无私者，前路禄马自来，幸福长久，天道从不亏待真正守正之人。"},
{"n": "第七十九签", "j": "吉", "p": "残月未还光\n樽前非语伤\n户中有人厄\n祈福保青阳", "m": "残月仍有光辉未逝，年岁渐长仍活力充沛；举杯之时无伤害之语，一切平和。家中虽稍有灾厄需留意，但只要诚心祈福，便如春日阳光般温暖安泰，平和处世自有护佑随行。", "d": [{"k": "愿望", "v": "愿望平淡可成勿高估"}, {"k": "疾病", "v": "久病慢养终痊愈"}, {"k": "失物", "v": "难以找回"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "迁居建造顺利"}, {"k": "旅行·出行", "v": "外出平安无事"}, {"k": "婚嫁·交友", "v": "感情平淡相处安稳", "f": 1}], "z": "残月犹光，年岁无惧。家中有厄莫轻忽，但诚心祈福、平和处世，如青阳春光自然温暖庇护，安泰之境从信心与从容中来。"},
{"n": "第八十签", "j": "大吉", "p": "深山多养道\n忠正帝王宣\n凤遂鸾飞去\n升高过九天", "m": "深山修行、养深积厚，忠正之德终被帝王宣召认可。凤凰与鸾鸟齐飞，正直之人登上广阔舞台；超越九天之高，此签预示：修身积德者终将大放光彩，出世之时已然到来。", "d": [{"k": "愿望", "v": "心愿圆满达成"}, {"k": "疾病", "v": "病痛消除身体健"}, {"k": "失物", "v": "失物易得"}, {"k": "待人", "v": "贵人如期相见"}, {"k": "迁居·建造", "v": "安家建房大吉"}, {"k": "旅行·出行", "v": "远行无阻平安"}, {"k": "婚嫁·交友", "v": "姻缘天赐步步高升", "f": 1}], "z": "深山修道，忠正终被天下知。凤凰齐飞不在于机缘巧合，而在于长年修身积德的厚积薄发；九天之高，正是为一步一步踏实攀登者而设。"},
{"n": "第八十一签", "j": "小吉", "p": "道合须成合\n先忧事更多\n所求财宝盛\n更变得中和", "m": "行为合乎天道，万事终将成就。起初悲忧苦多，似乎处处不顺，然而此后所求财宝自然丰盈聚来；先前的灾难终将转化为幸福，以变通之心守中和之道，繁盛自来。", "d": [{"k": "愿望", "v": "行事合道心愿可成"}, {"k": "疾病", "v": "病痛痊愈"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "贵人将至"}, {"k": "迁居·建造", "v": "迁居建造顺利"}, {"k": "旅行·出行", "v": "出行平安"}, {"k": "婚嫁·交友", "v": "婚恋交往和顺", "f": 1}], "z": "先苦后甜，是合道而行者必经的历程。起初多忧莫灰心，以中和之道应万变，财宝自聚，灾难自化，合道者终将迎来属于自己的繁盛。"},
{"n": "第八十二签", "j": "凶", "p": "火发应连天\n新愁惹旧僭\n欲求千里外\n要渡更无船", "m": "烈火直冲天际，欲望与愤怒难以平息；新的忧愁勾起旧日过失，雪上加霜。想逃往远处寻求出路，却发现无船可渡，前方大河横亘，极为艰难。此时唯有克制欲望、正视现实。", "d": [{"k": "愿望", "v": "愿望难以实现"}, {"k": "疾病", "v": "顽疾难愈"}, {"k": "失物", "v": "寻物无望"}, {"k": "待人", "v": "故人不至"}, {"k": "迁居·建造", "v": "不宜动土改造"}, {"k": "旅行·出行", "v": "不宜远行"}, {"k": "婚嫁·交友", "v": "诸事不利感情破损", "f": 1}], "z": "火冲天时最忌逃避现实、妄求远方。无船可渡是告诫：逃避只会使问题更难解决。克制欲望、面对当下，才能真正找到渡河之舟。"},
{"n": "第八十三签", "j": "凶", "p": "举步出云端\n高枝未可攀\n岂知身未稳\n犹在黑云间", "m": "踩云登天是妄想，高枝根本攀不上；自身生活尚不稳固，却无人相助。仰望清月，却仍被黑云遮蔽，看不清方向。此时需脚踏实地、静心行正，莫再妄想一步登天。", "d": [{"k": "愿望", "v": "所求难遂心意"}, {"k": "疾病", "v": "病势绵长"}, {"k": "失物", "v": "无法寻回"}, {"k": "待人", "v": "贵人不至"}, {"k": "迁居·建造", "v": "严禁搬家建房"}, {"k": "旅行·出行", "v": "出行凶险"}, {"k": "婚嫁·交友", "v": "交友婚恋皆不利", "f": 1}], "z": "脚踏实地是此时唯一正确的起点。云端高枝皆非当下可及，静心行正、稳固根基，黑云自会渐散，皎月终将显现。"},
{"n": "第八十四签", "j": "凶", "p": "否极方无泰\n花开值晚秋\n人情不调备\n财宝鬼来偷", "m": "否极之时，泰却迟迟不来；花开于晚秋寒风中，随即凋零，时不我与。人心不齐，苦情不断；辛苦积累的财产恐遭损失，甚至落入他人之手，最终贫困。需极度谨慎防范。", "d": [{"k": "愿望", "v": "愿望渺茫难成"}, {"k": "疾病", "v": "病情危重难愈"}, {"k": "失物", "v": "寻物无望"}, {"k": "待人", "v": "故人不至"}, {"k": "迁居·建造", "v": "不宜动土迁居"}, {"k": "旅行·出行", "v": "不宜外出远行"}, {"k": "婚嫁·交友", "v": "人际不和财运破败", "f": 1}], "z": "晚秋之花开即谢，否极之时泰尚远。防范财产损失、化解人际矛盾是当务之急；此时低调守护现有，比追求更多更为紧迫。"},
{"n": "第八十五签", "j": "大吉", "p": "望用何愁晚\n求名渐得宁\n芝书从远降\n终得异人成", "m": "愿望虽来得迟，无需悲叹，耐心等待是最正确的选择。名声渐升，心安平稳；在援助之下，大志终得实现，归路直入蓬莱仙境——福德、财产、长寿，皆在这条路的尽头等候。", "d": [{"k": "愿望", "v": "晚运极佳终圆梦"}, {"k": "疾病", "v": "疾病痊愈"}, {"k": "失物", "v": "迟寻可得"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "建造搬家大吉"}, {"k": "旅行·出行", "v": "出行顺畅"}, {"k": "婚嫁·交友", "v": "婚恋和睦长久安稳", "f": 1}], "z": "晚来之愿更须珍重，莫因迟到而放弃。名声渐升、心安平稳，援助自会到来，云梯终有路——此签告诉你：坚持等候者，终将归入福境。"},
{"n": "第八十六签", "j": "大吉", "p": "富贵天之祐\n何须苦用心\n前程应显迹\n久用得高临", "m": "阳台花朵盛开，万事如心所愿；财宝满载而来。学问之德彰显，受上位者赏识提携，愿望得成；骏马驰骋，英姿令众人赞叹。此乃大吉，学德兼修者荣华富贵指日可待。", "d": [{"k": "愿望", "v": "愿望顺其自然达成"}, {"k": "疾病", "v": "百病消除"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "贵人将至"}, {"k": "迁居·建造", "v": "迁居大吉"}, {"k": "旅行·出行", "v": "出行平安"}, {"k": "婚嫁·交友", "v": "姻缘美满人脉广阔", "f": 1}], "z": "花发财来、执文朝殿、走马听雷——此乃积学修德者的大吉景象。才德兼修不仅是立身之本，更是荣华富贵自然降临的根源。"},
{"n": "第八十七签", "j": "大吉", "p": "凿石方逢玉\n淘沙始见金\n青霄终有路\n只恐不坚心", "m": "凿石偶遇宝玉，淘沙方见黄金——财宝与机遇皆藏于持续努力之中。出世之路广阔无垠，天下皆可有为，唯一令人担忧的只是意志不够坚定，半途而废则一切落空。", "d": [{"k": "愿望", "v": "坚持便可圆满如愿"}, {"k": "疾病", "v": "完全康复"}, {"k": "失物", "v": "失物易得"}, {"k": "待人", "v": "贵人相见"}, {"k": "迁居·建造", "v": "建房安家顺利"}, {"k": "旅行·出行", "v": "远行无碍"}, {"k": "婚嫁·交友", "v": "感情稳固缘分深厚", "f": 1}], "z": "玉在石中，金在沙里，皆待坚心者方能得见。出世之路从不缺少，只缺坚定之人；意志坚定者，终将在意外之处遇见属于自己的宝玉。"},
{"n": "第八十八签", "j": "凶", "p": "作事不和同\n临危更主凶\n佳人生苦根\n闲事惹风骚", "m": "凡事皆与人不和，难以合作共进；处于危险之中，又有坏事接踵而来；与伴侣或家人之间苦忧不断；坏事接二连三重叠压来。此时需多加虔诚信仰，以谦和之心慎重行事，广结善缘。", "d": [{"k": "愿望", "v": "愿望难以实现"}, {"k": "疾病", "v": "久病难愈"}, {"k": "失物", "v": "无法寻回"}, {"k": "待人", "v": "故人不至"}, {"k": "迁居·建造", "v": "不宜改造迁居"}, {"k": "旅行·出行", "v": "不宜远行"}, {"k": "婚嫁·交友", "v": "感情辛苦交友招非", "f": 1}], "z": "处处不和、苦忧重叠，此时强行争胜只会适得其反。广结善缘、虔诚信仰，以谦和之心化解重重困难，和气才是此时打开局面的唯一钥匙。"},
{"n": "第八十九签", "j": "大吉", "p": "残月未还光\n樽前非语伤\n户中有人厄\n祈福保青阳", "m": "你本如一块无瑕美玉，是天赐之物；从今日起持续磨砺自身，便将得名人赏识、贵人提携。智慧与财富将源源涌现，无限喜悦之时即将到来，此乃大吉，磨砺之人天必厚待。", "d": [{"k": "愿望", "v": "愿望平缓可成勿贪求"}, {"k": "疾病", "v": "久病可愈"}, {"k": "失物", "v": "难以找回"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "居家顺利"}, {"k": "旅行·出行", "v": "出行平安"}, {"k": "婚嫁·交友", "v": "感情平淡安稳度日", "f": 1}], "z": "无瑕美玉需磨砺方显光华，天赐之质需自身努力方能成器。从今日起好好琢磨，贵人的眼光永远留给真正努力者，喜气盈门正在前方等候。"},
{"n": "第九十签", "j": "大吉", "p": "深山多养道\n忠正帝王宣\n凤遂鸾飞去\n升高过九天", "m": "一颗真心诚意终可上达天听，立身出世之时已然到来；天赐恩惠，各种财宝到手，前路处处遇善事。得上位者与观音菩萨之力引导，朝善的方向前行，此乃真诚之人应得的大吉回报。", "d": [{"k": "愿望", "v": "所求皆能如愿"}, {"k": "疾病", "v": "身体健康病痛消"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "贵人相助"}, {"k": "迁居·建造", "v": "安家大吉"}, {"k": "旅行·出行", "v": "出行顺畅"}, {"k": "婚嫁·交友", "v": "婚恋大吉前程远大", "f": 1}], "z": "一信向天，天必回应。真心诚意是最强大的力量，一切财宝、善事与贵人，皆因你的真诚而自然汇聚，此刻全力以诚待人待事，前途必成好事。"},
{"n": "第九十一签", "j": "吉", "p": "改变前途去\n月桂又逢圆\n云中乘禄至\n凡事可宜先", "m": "痛改过去的陋习、重新出发，命运便会随之转变好转。如月亮由缺转圆，圆满之象渐渐成形。福禄从云端自然降临，凡事抢先一步主动出击，皆能获得良好结果。守正道是一切转变的根基。", "d": [{"k": "愿望", "v": "改过向善心愿必成"}, {"k": "疾病", "v": "疾病痊愈"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "贵人将至"}, {"k": "迁居·建造", "v": "迁居建造顺利"}, {"k": "旅行·出行", "v": "出行平安"}, {"k": "婚嫁·交友", "v": "感情和顺相处融洽", "f": 1}], "z": "改变是此签最核心的行动指令。痛改旧习、重新出发，月自由缺转圆，福禄从云端随之而来——凡事先行一步，守正道者天道自助。"},
{"n": "第九十二签", "j": "吉", "p": "自幼常为旅\n逢春骏马骅\n前程宜进步\n得箭降青霄", "m": "自幼漂泊辛苦，历尽颠沛不安；然而春来之时，骏马奋蹄，运气终于好转。此时宜积极进取，全力前行，一切皆可如愿。箭矢笔直射出，必有斩获，天降好运，乘势而为正当时。", "d": [{"k": "愿望", "v": "机缘一到愿望速成"}, {"k": "疾病", "v": "身体健康快速康复"}, {"k": "失物", "v": "失物易得"}, {"k": "待人", "v": "贵人相见"}, {"k": "迁居·建造", "v": "建房顺利"}, {"k": "旅行·出行", "v": "远行大吉"}, {"k": "婚嫁·交友", "v": "姻缘美满事业上升", "f": 1}], "z": "漂泊之苦是骏马奋蹄前的积蓄，春风一至，蓄势爆发正当其时。前程宜进，莫再踟蹰，此时全力射出，必有斩获于青霄之间。"},
{"n": "第九十三签", "j": "吉", "p": "有鱼临旱池\n踊跃入波涛\n隔中须有望\n先且虑尘劳", "m": "鱼在旱池中将死，须放入江河方能重获生机——你的处境若能改变环境与方式，运势将逐渐好转。途中虽有妨碍需注意，暂时须辛苦忍耐；但若能自我克制、守住真心，苦尽甘来终可期。", "d": [{"k": "愿望", "v": "脱离困境终能如愿"}, {"k": "疾病", "v": "久病可愈过程长"}, {"k": "失物", "v": "难以找回"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "居家运势普通"}, {"k": "旅行·出行", "v": "出行顺畅"}, {"k": "婚嫁·交友", "v": "交往和睦感情安稳", "f": 1}], "z": "旱池之鱼，换得江河则生。改变环境、调整方式是此时的关键行动；辛苦忍耐、克己自持，是换得波涛新生的必要代价，苦尽后甘来必至。"},
{"n": "第九十四签", "j": "半吉", "p": "事忌樽前语\n人防小辈交\n幸乞阴公祐\n方免事敌交", "m": "酒桌前的言语须格外谨慎，不可轻信与滥言；与地位低者的往来需保持适当距离，不宜过度依赖。顺从神佛与长上之意行事，消除敌对心态、广结善缘，方可逐步走向幸福。", "d": [{"k": "愿望", "v": "愿望短期难以达成"}, {"k": "疾病", "v": "康复缓慢渐好转"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "贵人将至"}, {"k": "迁居·建造", "v": "不宜动土迁居"}, {"k": "旅行·出行", "v": "出行平平"}, {"k": "婚嫁·交友", "v": "感情平淡防备小人", "f": 1}], "z": "言多必失，交浅言深是此时最大隐患。谨言慎行、顺从长上、广结善缘——三者并行，敌对自消，善缘积累则幸福之路自然展开。"},
{"n": "第九十五签", "j": "吉", "p": "志气勤修业\n禄位未造逢\n若闻金鳞语\n乘船得便风", "m": "立定志向、一心勤修事业，终将走向良好方向。现时福运尚未降临，但必在此后到来——如等待天明鸡鸣，静候时机方为正道。时机来临，风送船行，幸福之方向将自然展开。", "d": [{"k": "愿望", "v": "勤恳积累时到自成"}, {"k": "疾病", "v": "久病慢养得痊愈"}, {"k": "失物", "v": "难以找回"}, {"k": "待人", "v": "相见迟缓"}, {"k": "迁居·建造", "v": "建造搬家顺利"}, {"k": "旅行·出行", "v": "出行平安"}, {"k": "婚嫁·交友", "v": "婚恋和睦运势渐旺", "f": 1}], "z": "金鸡未鸣，时机未至，此时最需要的是志定勤修、静候天明。鸡鸣风来之日，顺势扬帆，幸福之路从此一帆风顺。"},
{"n": "第九十六签", "j": "大吉", "p": "花发应阳台\n车行进宝财\n执文朝帝殿\n走马听声雷", "m": "如雄鸡追随凤凰同飞，借助有地位之人的力量可出人头地；止步高林整理羽翼，与高人交流获得提升。自主撑船渡岸，心安稳则可渡难关；立身出世之后，财宝满船而归，幸福有保障。", "d": [{"k": "愿望", "v": "大富大贵心愿圆满"}, {"k": "疾病", "v": "百病全消"}, {"k": "失物", "v": "失物可寻"}, {"k": "待人", "v": "贵人相助"}, {"k": "迁居·建造", "v": "安家大吉"}, {"k": "旅行·出行", "v": "远行顺畅"}, {"k": "婚嫁·交友", "v": "姻缘兴旺人脉显贵", "f": 1}], "z": "借助贵人之力非依赖，而是智慧的借力使力。整羽高林、自主撑舟——既借外力又自立自强，财宝满归正是给兼具谦逊与行动力之人的大吉回报。"},
{"n": "第九十七签", "j": "凶", "p": "雾罩重楼屋\n佳人立流水\n白云归去路\n不见月波澄", "m": "高楼被雾笼罩，烦恼不散，每日阴郁难开；孤身涉险如弱女子独行水上，处境危险。白云漂移方向不定，前路难以看清；水中月影被波浪搅乱，诸多妨碍难以明辨。首要之务是稳定内心。", "d": [{"k": "愿望", "v": "愿望难以实现"}, {"k": "疾病", "v": "病情凶险需静养"}, {"k": "失物", "v": "寻物无望"}, {"k": "待人", "v": "故人不至"}, {"k": "迁居·建造", "v": "不宜改造迁居"}, {"k": "旅行·出行", "v": "不宜远行"}, {"k": "婚嫁·交友", "v": "感情迷茫缘分浅薄", "f": 1}], "z": "雾中难辨方向，波中难见月影——此时一切行动皆需慎之又慎。稳定内心是首务，心定则雾自渐散，切勿在方向未明之时轻率冒险。"},
{"n": "第九十八签", "j": "凶", "p": "欲理新丝乱\n闲愁惹旧僭\n久困重轮下\n黄金未出渠", "m": "想理清乱丝却越理越乱，内心苦楚难言；烦恼悲伤极多，善恶难辨；如鱼困罗网，挣扎痛苦，自己与周围的人皆陷于悲苦之中。然而若能保持信心、忍耐苦难，终有解脱之时。", "d": [{"k": "愿望", "v": "所求难遂心意"}, {"k": "疾病", "v": "久病难愈"}, {"k": "失物", "v": "无法寻回"}, {"k": "待人", "v": "贵人不至"}, {"k": "迁居·建造", "v": "不宜动土搬家"}, {"k": "旅行·出行", "v": "杜绝长途出行"}, {"k": "婚嫁·交友", "v": "感情纷乱烦恼缠身", "f": 1}], "z": "乱丝越急越乱，罗网越挣越紧。此时放下急切、保持信心、忍耐苦难，才是解脱之道；困境并非终点，信心守住，终有破网而出之日。"},
{"n": "第九十九签", "j": "大吉", "p": "红日当门照\n暗月再重圆\n遇珍须得宝\n颜有称心田", "m": "朝日辉煌照耀门前，天赐明亮好运；漫漫黑夜之后，月亮重新圆满，照亮四方，令人心情舒畅、周围和谐。可得珍贵财宝，名声大振，心想事成。然需时刻警惕骄傲与自满。", "d": [{"k": "愿望", "v": "鸿运临门万事皆成"}, {"k": "疾病", "v": "疾病完全康复"}, {"k": "失物", "v": "失物易得"}, {"k": "待人", "v": "贵人相见"}, {"k": "迁居·建造", "v": "迁居大吉"}, {"k": "旅行·出行", "v": "出行平安"}, {"k": "婚嫁·交友", "v": "姻缘圆满事事称心", "f": 1}], "z": "红日当头、月再圆满，此乃大吉之象，鸿运已至。然盛极之时最忌自满骄傲——谦虚谨慎，才能让这份好运长久相伴，切勿因一时得意而折损天赐之福。"},
{"n": "第一百签", "j": "凶", "p": "禄走白云间\n携琴过远山\n不遇神仙面\n空惹意阑珊", "m": "幸运如白云消散，福禄已去，失去依靠；持琴越山而去，象征遁世逃避之意，然山路之上亦无法遇见能予指引的仙人，内心空茫无依。此时需彻底改变心态，放下过大野望，踏实立足当下。", "d": [{"k": "愿望", "v": "愿望渺茫强求无果"}, {"k": "疾病", "v": "顽疾难愈"}, {"k": "失物", "v": "寻物无望"}, {"k": "待人", "v": "故人不至"}, {"k": "迁居·建造", "v": "不宜建造迁居"}, {"k": "旅行·出行", "v": "不宜远行游历"}, {"k": "婚嫁·交友", "v": "缘分淡薄心境低落", "f": 1}], "z": "禄去琴远，空悲无益。仙人不遇，是因心尚未准备好。放下过大执念、踏实生活、改变心态——脚踏实地的人，终将在平凡之处遇见属于自己的神仙指引。"}
];

const BADGE_STYLES = {
  '大吉':  ['大　吉','#3D5C38','#D4E6CE'],
  '吉':    ['吉',    '#3D5C38','#E4EEE0'],
  '小吉':  ['小　吉','#5A6E30','#E8EDD8'],
  '末吉':  ['末　吉','#7A8A78','#E0E4DC'],
  '末小吉':['末小吉','#7A8A78','#E0E4DC'],
  '半吉':  ['半　吉','#5C7050','#DCE8D4'],
  '凶':    ['凶',    '#7A4A3A','#EAE0DC'],
};

const STICK_COLORS = ['#E87878','#78B878','#7898D8','#D8B860','#A878C8'];

let busy=false, cnt=0, a0={x:0,y:0,z:0}, tmr=null;

function spawnSticks(){
  const el=document.getElementById('flySticks'); el.innerHTML='';
  for(let i=0;i<6;i++){
    const s=document.createElement('div'); s.className='fly-stick';
    const r=(Math.random()-.5)*70, lx=24+(Math.random()*80), h=20+Math.random()*20;
    s.style.cssText=`left:${lx}px;top:28px;height:${h}px;--r:${r}deg;animation-delay:${i*.05}s;background:${STICK_COLORS[i%5]};`;
    el.appendChild(s); setTimeout(()=>s.remove(),1000);
  }
}

function sndShake(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    for(let i=0;i<6;i++) setTimeout(()=>{
      const b=ctx.createBuffer(1,ctx.sampleRate*.03,ctx.sampleRate),d=b.getChannelData(0);
      for(let j=0;j<d.length;j++) d[j]=(Math.random()*2-1)*.14;
      const s=ctx.createBufferSource(),g=ctx.createGain();
      s.buffer=b; g.gain.setValueAtTime(.2,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.01,ctx.currentTime+.03);
      s.connect(g); g.connect(ctx.destination); s.start();
    },i*72);
  }catch(e){}
}

function sndReveal(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [392,494,587,740].forEach((f,i)=>setTimeout(()=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.frequency.value=f; o.type='sine';
      g.gain.setValueAtTime(.05,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.65);
      o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+.65);
    },i*95));
  }catch(e){}
}

function doShake(){
  if(busy) return; busy=true;
  sndShake(); spawnSticks();
  const svg=document.getElementById('jarSvg');
  svg.style.animation='none'; void svg.offsetWidth;
  svg.classList.add('shaking');
  setTimeout(()=>{ svg.classList.remove('shaking'); svg.style.animation=''; busy=false; showResult(); },800);
}

function animatePoem(poem){
  const el=document.getElementById('resPoem'); el.innerHTML='';
  [...poem].forEach((ch,i)=>{
    if(ch==='\n'){ el.appendChild(document.createElement('br')); return; }
    const sp=document.createElement('span'); sp.className='poem-char';
    sp.textContent=ch; sp.style.animationDelay=`${i*.042}s`;
    el.appendChild(sp);
  });
}

function showResult(){
  const f=F[Math.floor(Math.random()*F.length)];
  document.getElementById('resNum').textContent=f.n;
  const bs=BADGE_STYLES[f.j]||['?','#555','#eee'];
  const badge=document.getElementById('resBadge');
  badge.textContent=bs[0]; badge.style.color=bs[1]; badge.style.background=bs[2];
  animatePoem(f.p);
  document.getElementById('resMeaning').textContent=f.m;
  const tbl=document.getElementById('resDd'); tbl.innerHTML='';
  f.d.forEach(x=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td class="dd-key">${x.k}</td><td class="dd-sep">：</td><td class="dd-val">${x.v}</td>`;
    tbl.appendChild(tr);
  });
  document.getElementById('resZhenyan').textContent=f.z;
  document.getElementById('home').style.display='none';
  document.getElementById('result').style.display='flex';
  window.scrollTo(0,0);
  sndReveal();
  if(navigator.vibrate) navigator.vibrate([20,15,40]);
}

function resetApp(){
  document.getElementById('home').style.display='flex';
  document.getElementById('result').style.display='none';
  window.scrollTo(0,0);
}

function startMotion(){
  window.addEventListener('devicemotion',e=>{
    const a=e.accelerationIncludingGravity; if(!a) return;
    const dx=Math.abs(a.x-a0.x),dy=Math.abs(a.y-a0.y),dz=Math.abs(a.z-a0.z);
    a0={x:a.x,y:a.y,z:a.z};
    if(dx+dy+dz>20){
      cnt++; clearTimeout(tmr); tmr=setTimeout(()=>cnt=0,800);
      if(cnt>=2&&!busy&&document.getElementById('result').style.display!=='flex'){
        doShake(); cnt=0;
      }
    }
  });
}

const jw=document.getElementById('jarWrap');
jw.addEventListener('touchstart',function req(){
  if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
    DeviceMotionEvent.requestPermission().then(s=>{ if(s==='granted') startMotion(); }).catch(()=>{});
  }
  jw.removeEventListener('touchstart',req);
},{passive:true,once:true});
startMotion();

window.addEventListener('load',()=>{
  setTimeout(()=>{
    const ov=document.getElementById('overlay');
    ov.style.opacity='0';
    setTimeout(()=>ov.style.display='none',400);
  },500);
});
</script>
</body>
</html>
